<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>민원 서식 작성 미리보기 도우미</title>
<!--
  ⚠️ 이 파일은 build-form.js 생성물입니다. 직접 수정하지 마세요.
     소스: engine/base.html + engine/engine.js + forms/<이름>.config.js
     재생성: node tools/build-form.js <이름>
  - 단일 HTML 파일 · 외부 서버/라이브러리/CDN/폰트/이미지 없음
  - 입력값은 브라우저 메모리에서만 처리 · 저장(localStorage 등) 안 함 · 새로고침 시 소멸
  - 좌: 실제 서식 이미지 위에 값 오버레이 (실시간 반영) / 우: 단계별 간단 입력
  - 작성 보조·미리보기용 (공식 접수 가능 여부 미보장)
-->
<style>
  :root{
    --blue:#1b5fc0; --blue-dark:#164e9e; --blue-light:#eaf1fb;
    --line:#d5d9df; --bg:#f2f4f7; --muted:#5b626c; --ink:#1a1c1f;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:"Malgun Gothic","맑은 고딕",system-ui,-apple-system,sans-serif;
    font-size:17px;line-height:1.55;}

  /* ===== 상단 바 ===== */
  .topbar{display:flex;flex-wrap:wrap;align-items:center;gap:12px 16px;
    padding:14px 20px;background:#fff;border-bottom:2px solid var(--blue);
    position:sticky;top:0;z-index:20;}
  .brand{display:flex;flex-direction:column;margin-right:auto;}
  .brand h1{margin:0;font-size:20px;color:var(--blue-dark);}
  .brand .meta{font-size:14px;color:var(--muted);}
  .actions{display:flex;gap:10px;flex-wrap:wrap;}
  .btn{font-family:inherit;font-size:16px;font-weight:600;border:1.5px solid var(--blue);
    background:#fff;color:var(--blue);border-radius:10px;padding:11px 16px;cursor:pointer;
    text-decoration:none;display:inline-flex;align-items:center;}
  .btn:hover{background:var(--blue-light);}
  .btn.primary{background:var(--blue);color:#fff;}
  .btn.primary:hover{background:var(--blue-dark);}
  .btn.ghost{border-color:var(--line);color:var(--muted);}
  .btn.ghost:hover{background:var(--bg);}
  .btn:disabled{opacity:.45;cursor:default;}
  .test-tag{font-size:12px;color:#b26a00;background:#fff3e0;border:1px solid #ffd79a;
    border-radius:6px;padding:2px 6px;margin-left:6px;}

  /* ===== 2단 레이아웃 ===== */
  .layout{display:flex;gap:22px;align-items:flex-start;padding:22px;max-width:1420px;margin:0 auto;}
  .form-col{flex:1 1 auto;min-width:0;}
  .panel-col{flex:0 0 400px;width:400px;}

  /* ===== 좌측: 실제 서식 이미지 위에 값 오버레이 (여권 도우미와 동일 방식) ===== */
  .paper{background:#fff;box-shadow:0 3px 14px rgba(0,0,0,.10);width:210mm;margin:0 auto;
    -webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .stage{position:relative;width:100%;container-type:inline-size;}
  .stage .bg{display:block;width:100%;height:auto;}
  .ovl{position:absolute;inset:0;pointer-events:none;}
  /* 얹는 글자 = 검은 펜 느낌 */
  .ov{position:absolute;transform:translate(-50%,-50%);color:#111;font-weight:700;line-height:1;white-space:nowrap;}
  .ov.o{color:#c0392b;font-weight:900;-webkit-text-stroke:0.5px #c0392b;}  /* 선택항목 영표 ○ (진하게) */
  .ov.t{transform:translateY(-50%);}            /* 좌측정렬 자유 텍스트(세로중앙; wrap 2줄도 칸 중앙) */
  .ov.r{transform:translate(-100%,-50%);}       /* 우측정렬(기준점=우측 끝) */
  /* 현재 단계 강조(화면 전용) */
  .ovhl{position:absolute;background:rgba(27,95,192,.12);outline:1.6px solid #1b5fc0;border-radius:2px;pointer-events:none;}
  /* 형광펜: 인쇄 후 날인·서명해야 하는 칸 (화면·인쇄 모두 표시) */
  .ovhi{position:absolute;background:rgba(255,232,0,.55);border-radius:4px;pointer-events:none;
    mix-blend-mode:multiply;-webkit-print-color-adjust:exact;print-color-adjust:exact;}

  /* ===== 우측: 모바일형 입력 패널 ===== */
  .phone{background:#fff;border:1px solid var(--line);border-radius:22px;
    box-shadow:0 6px 22px rgba(0,0,0,.08);overflow:hidden;}
  .phone-head{background:var(--blue);color:#fff;padding:16px 18px;}
  .wiz-title{font-size:20px;font-weight:700;}
  .wiz-count{font-size:14px;opacity:.9;margin-top:3px;}
  .stepper{display:flex;margin-top:14px;}
  .stp{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;min-width:0;}
  .stp+.stp::before{content:"";position:absolute;top:12px;right:50%;width:100%;height:3px;
    background:rgba(255,255,255,.30);z-index:0;}
  .stp.done::before,.stp.cur::before{background:#fff;}
  .stp-dot{position:relative;z-index:1;width:26px;height:26px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;
    background:rgba(255,255,255,.25);color:#fff;border:2px solid transparent;
    transition:transform .15s,background .15s;}
  .stp.done .stp-dot{background:#fff;color:var(--blue);}
  .stp.cur .stp-dot{background:#fff;color:var(--blue-dark);border-color:#bfe0ff;
    transform:scale(1.18);box-shadow:0 0 0 4px rgba(255,255,255,.28);}
  .stp-lab{font-size:9.5px;line-height:1.2;margin-top:5px;text-align:center;
    color:rgba(255,255,255,.72);white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:ellipsis;}
  .stp.cur .stp-lab{color:#fff;font-weight:700;}
  .stp.nav .stp-dot{cursor:pointer;}
  .stp.nav .stp-dot:hover{background:#eaf3ff;}
  .wiz-body{padding:18px;max-height:calc(100vh - 320px);overflow:auto;}

  .coach-q{font-size:22px;font-weight:800;line-height:1.35;margin-bottom:8px;}
  .coach-sub{font-size:15.5px;color:var(--muted);margin-bottom:14px;line-height:1.6;}
  .why-box{display:flex;gap:8px;font-size:15.5px;color:#1c4e86;background:#eef6ff;
    border:1px solid #cfe2f7;border-radius:10px;padding:11px 13px;margin-bottom:16px;line-height:1.6;}
  .why-box .ic{flex:none;}
  .note-box{font-size:15px;color:#7a5b00;background:#fff8e6;border:1px solid #f2dd9c;
    border-radius:10px;padding:11px 13px;margin-bottom:16px;line-height:1.6;}

  .field{margin-bottom:16px;}
  .field.half{display:inline-block;width:calc(50% - 5px);}
  .field.half + .field.half{margin-left:8px;}
  .field-label{display:block;font-size:16px;font-weight:700;margin-bottom:7px;}
  .fb{font-size:12px;border-radius:6px;padding:1px 7px;font-weight:700;margin-left:6px;vertical-align:middle;}
  .fb-req{color:#c0392b;background:#fdecec;border:1px solid #f3b4b4;}
  .fb-opt{color:#5b626c;background:#eef1f5;border:1px solid #d5d9df;}
  .q-help{font-size:14px;color:var(--muted);margin:-2px 0 8px;line-height:1.5;}
  .text-input{width:100%;font-family:inherit;font-size:17px;padding:12px 13px;border:1.6px solid var(--line);
    border-radius:10px;background:#fff;color:var(--ink);}
  .text-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(27,95,192,.18);outline:none;}

  .opts{display:flex;flex-direction:column;gap:9px;margin-bottom:6px;}
  .opts.row{flex-direction:row;flex-wrap:wrap;}
  .opt{font-family:inherit;font-size:16.5px;text-align:left;padding:13px 15px;border:1.8px solid var(--line);
    border-radius:12px;background:#fff;color:var(--ink);cursor:pointer;font-weight:600;}
  .opts.row .opt{flex:1 1 auto;text-align:center;}
  .opt:hover{border-color:var(--blue);background:var(--blue-light);}
  .opt.sel{border-color:var(--blue);background:var(--blue);color:#fff;}
  .opt small{display:block;font-size:13px;font-weight:500;opacity:.85;margin-top:2px;}

  .step-warn{padding:0 18px;min-height:8px;color:#c0392b;font-size:15px;font-weight:600;}
  .step-warn:not(:empty){padding:10px 18px;}
  .wiz-nav{display:flex;gap:10px;padding:14px 18px 18px;}
  .wiz-nav .btn{flex:1;justify-content:center;}
  .link-skip{display:block;width:100%;text-align:center;background:none;border:none;color:var(--muted);
    font-family:inherit;font-size:14.5px;text-decoration:underline;cursor:pointer;padding:4px 0 12px;}

  .sum-sec{margin-bottom:14px;}
  .sum-sec h4{margin:0 0 6px;font-size:15px;color:var(--blue-dark);border-bottom:1px solid var(--blue-light);padding-bottom:4px;}
  .sum-row{display:flex;gap:8px;font-size:15px;padding:3px 0;}
  .sum-row .k{flex:0 0 118px;color:var(--muted);}
  .sum-row .val{flex:1;font-weight:600;}
  .sum-row .val.empty{color:#c0392b;font-weight:600;}
  .info-box{font-size:15px;color:#0d5a34;background:#e9f7ef;border:1px solid #bfe6cf;
    border-radius:10px;padding:12px 14px;margin:14px 0;line-height:1.6;}

  .screen-notice{margin-top:18px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 18px;}
  .screen-notice h3{margin:0 0 8px;font-size:16px;color:var(--blue-dark);}
  .screen-notice ul{margin:0;padding-left:20px;}
  .screen-notice li{font-size:14.5px;color:#333;line-height:1.65;}

  :focus-visible{outline:3px solid var(--blue);outline-offset:2px;}

  /* ===== 반응형: 좁은 화면 = 입력 패널만 (서식은 미리보기 버튼) ===== */
  .m-preview{display:none;}
  @media (max-width:900px){
    .layout{flex-direction:column;padding:14px;}
    .panel-col{flex:1 1 auto;width:100%;order:1;}
    .form-col{display:none;order:2;}
    .m-preview{display:block;width:calc(100% - 36px);margin:0 18px 4px;font-family:inherit;
      font-size:16px;font-weight:700;color:var(--blue);background:var(--blue-light);
      border:1.5px solid var(--blue);border-radius:10px;padding:12px;cursor:pointer;}
    .actions .btn.hide-m{display:none;}
  }

  /* ===== 미리보기 모달 ===== */
  .modal-back{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;display:none;
    flex-direction:column;padding:14px;}
  body.pv-open .modal-back{display:flex;}
  .modal-top{display:flex;justify-content:space-between;align-items:center;color:#fff;gap:10px;padding:4px 2px 10px;}
  .modal-top b{font-size:18px;}
  .modal-scroll{flex:1;overflow:auto;display:flex;justify-content:center;background:#5a5a5a;padding:12px;border-radius:8px;}
  .modal-scroll .paper{width:min(210mm,96vw);height:max-content;box-shadow:0 4px 20px rgba(0,0,0,.4);}

  /* ===== 인쇄 ===== */
  @media print{
    @page{size:A4;margin:0;}
    .topbar,.panel-col,.m-preview,.modal-back,.ovhl{display:none !important;}
    .layout{display:block;padding:0;}
    .form-col{display:block !important;}
    .paper{box-shadow:none;width:auto;margin:0;padding:0;}
    .ov{color:#000 !important;}
    .ov.o{color:#c0392b !important;}
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <h1 id="docTitle"></h1>
    <div class="meta"><span id="orgName"></span> · <span id="today"></span></div>
  </div>
  <div class="actions">
    <a class="btn ghost" href="index.html" title="민원 서식 목록으로 돌아갑니다">← 서식 목록</a>
    <button class="btn ghost hide-m" id="btnSampleAdult"></button>
    <button class="btn ghost hide-m" id="btnSampleMinor"></button>
    <button class="btn ghost" id="btnReset">초기화</button>
    <button class="btn" id="btnPreview">미리보기</button>
    <button class="btn primary" id="btnPrint">인쇄 / PDF 저장</button>
  </div>
</header>

<div class="layout">
  <section class="form-col" aria-label="서식 미리보기">
    <div class="paper"><div class="stage"><img class="bg" alt="서식"><div class="ovl" id="ovl"></div></div></div>
  </section>

  <aside class="panel-col">
    <div class="phone">
      <div class="phone-head">
        <div class="wiz-title" id="wizTitle"></div>
        <div class="wiz-count" id="wizCount"></div>
        <div class="stepper" id="stepper" role="progressbar" aria-valuemin="1" aria-valuemax="10" aria-valuenow="1"></div>
      </div>
      <div class="wiz-body" id="wizBody" aria-live="polite"></div>
      <div class="step-warn" id="stepWarn" role="status"></div>
      <button type="button" class="m-preview" id="btnPreviewMobile">🔍 완성된 서식 미리보기</button>
      <div class="wiz-nav">
        <button class="btn ghost" id="btnPrev">← 이전</button>
        <button class="btn primary" id="btnNext">다음 →</button>
      </div>
      <button type="button" class="link-skip" id="btnSkip">이 단계는 잘 모르겠어요 · 나중에 창구에서</button>
    </div>
    <div class="screen-notice">
      <h3>이용 안내</h3>
      <ul>
        <li>본 도구는 서식 작성을 돕기 위한 미리보기 도구입니다.</li>
        <li>입력한 내용은 서버로 전송되지 않으며 저장되지 않습니다.</li>
        <li>공식 신고서와 항목·배치가 다를 수 있습니다.</li>
        <li>실제 접수 가능 여부와 필요 서류는 담당 직원의 확인을 따릅니다.</li>
        <li>서명·날인은 인쇄한 뒤 본인이 직접 해야 합니다.</li>
      </ul>
    </div>
  </aside>
</div>

<div class="modal-back" id="modalBack">
  <div class="modal-top"><b id="modalTitle"></b>
    <button class="btn" id="btnCloseModal">닫기 ✕</button></div>
  <div class="modal-scroll"><div class="paper"><div class="stage"><img class="bg" alt="서식"><div class="ovl" id="ovlModal"></div></div></div></div>
</div>

function deceasedName(){ return ((state.d_surKor||"")+(state.d_givenKor||"")).trim(); }

/* 0) 실행 시각 (무저장) */
var APP_TODAY = null;

/* 1) 상태 (메모리 전용 · 저장 안 함 · 새로고침 시 소멸) */
function createEmptyState(){
  var s={ step:1, unsure:{} };
  var keys=FORM.stateKeys||[];
  for(var i=0;i<keys.length;i++) s[keys[i]]="";
  var def=FORM.stateDefaults||{};
  for(var k in def){ if(def.hasOwnProperty(k)) s[k]=def[k]; }
  return s;
}
var state = createEmptyState();

/* 2) 파생 (서식 config에서 쓸 수 있는 공통 헬퍼) */
function juminAge(jumin){
  var j=String(jumin||"").replace(/\D/g,"");
  if(j.length<7) return null;
  var yy=+j.slice(0,2), mm=+j.slice(2,4), dd=+j.slice(4,6), code=+j.charAt(6), c;
  if(code===1||code===2||code===5||code===6) c=1900;
  else if(code===3||code===4||code===7||code===8) c=2000;
  else if(code===9||code===0) c=1800;
  else return null;
  if(mm<1||mm>12||dd<1||dd>31) return null;
  var t=APP_TODAY||new Date();
  return t.getFullYear()-(c+yy)-((t.getMonth()+1<mm)||(t.getMonth()+1===mm&&t.getDate()<dd)?1:0);
}
function isMinor(p){ var a=juminAge(state[p+"_jumin"]); return a!=null && a<19; }
/* 주민등록번호 → 출생연월일 "YYYY.MM.DD" (7번째 자리로 세기 판정) */
function birthFromJumin(jumin){
  var j=digits(jumin); if(j.length<7) return "";
  var yy=j.slice(0,2), mm=j.slice(2,4), dd=j.slice(4,6), code=+j.charAt(6), c;
  if(code===1||code===2||code===5||code===6) c=1900;
  else if(code===3||code===4||code===7||code===8) c=2000;
  else if(code===9||code===0) c=1800;
  else return "";
  var m=+mm, d=+dd; if(m<1||m>12||d<1||d>31) return "";
  return (c+ +yy)+"."+mm+"."+dd;
}

/* 3) 포매터 */
function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){
  return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]; }); }
function formatDate(d){
  var y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0"), day=String(d.getDate()).padStart(2,"0");
  var w=["일","월","화","수","목","금","토"][d.getDay()];
  return y+"년 "+m+"월 "+day+"일 ("+w+")";
}
function formatJumin(v){
  var d=String(v||"").replace(/\D/g,"").slice(0,13);
  if(d.length<=6) return d;
  return d.slice(0,6)+"-"+d.slice(6);
}
function formatPhone(v){
  var d=String(v||"").replace(/\D/g,"").slice(0,11);
  if(d.length<4) return d;
  if(d.length<7) return d.slice(0,3)+"-"+d.slice(3);
  if(d.length<11) return d.slice(0,3)+"-"+d.slice(3,6)+"-"+d.slice(6);
  return d.slice(0,3)+"-"+d.slice(3,7)+"-"+d.slice(7);
}
/* 숫자 8자리 → yyyy.mm.dd, 그 외는 입력값 유지 */
function formatDateFlexible(v){
  var raw=String(v||"");
  var d=raw.replace(/\D/g,"");
  if(d.length===8) return d.slice(0,4)+"."+d.slice(4,6)+"."+d.slice(6);
  return raw;
}
function digits(s){ return String(s||"").replace(/\D/g,""); }
function j1(s){ return digits(s).slice(0,6); }
function j2(s){ return digits(s).slice(6,13); }
function ymd(s){ var m=String(s||"").match(/(\d{4})\D*(\d{1,2})\D*(\d{1,2})/); return m?[m[1],m[2],m[3]]:["","",""]; }

/* 4) 좌측: 실제 서식 이미지 위에 값 오버레이 */
var PW=595, PH=841;        // PDF 포인트 좌표계 (배경 이미지도 동일 A4 비율)
var CO=FORM.CO, STEP_HL=FORM.STEP_HL||{};

function buildVals(){ return FORM.buildVals(state); }

function stepHighlights(X,Y){
  var boxes=STEP_HL[state.step]; if(!boxes) return "";
  var h="";
  boxes.forEach(function(b){
    h+='<span class="ovhl" style="left:'+X(b[0])+'%;top:'+Y(b[1])+'%;width:'+
       ((b[2]-b[0])/PW*100).toFixed(2)+'%;height:'+((b[3]-b[1])/PH*100).toFixed(2)+'%;"></span>';
  });
  return h;
}

// 배경 서식 이미지 위에 값/영표를 얹어 그림 (좌측 + 미리보기 모달 공용)
function renderForm(){
  var v=buildVals(), h="";
  var X=function(x){return (x/PW*100).toFixed(2);}, Y=function(y){return (y/PH*100).toFixed(2);};
  var fs=function(pt){return (pt/PW*100).toFixed(2);};   // 포인트 → cqw

  // 현재 단계 강조(맨 밑에 깔림)
  h+=stepHighlights(X,Y);

  // 형광펜: 인쇄 후 날인·서명해야 하는 칸 — 서식 config가 조건부로 반환
  var HI=(FORM.signatureHI?FORM.signatureHI(v,state):[])||[];
  HI.forEach(function(b){
    h+='<span class="ovhi" style="left:'+X(b[0])+'%;top:'+Y(b[1])+'%;width:'+
       ((b[2]-b[0])/PW*100).toFixed(2)+'%;height:'+((b[3]-b[1])/PH*100).toFixed(2)+'%;"></span>';
  });

  // 자유 텍스트 값 (신청서 내부 글자 — 가독성 위해 +1.5pt 확대; nb면 확대 안 함)
  var TEXT_BUMP=1.5;
  Object.keys(CO.texts).forEach(function(k){
    var val=String(v[k]==null?"":v[k]).trim(); if(!val) return;
    var t=CO.texts[k], cls="ov"+(t.a==="l"?" t":"")+(t.a==="r"?" r":"");
    var st="left:"+X(t.x)+"%;top:"+Y(t.y)+"%;font-size:"+fs(t.size+(t.nb?0:TEXT_BUMP))+"cqw;";
    if(t.wrap){ st+="width:"+(t.w/PW*100).toFixed(2)+"%;white-space:normal;line-height:1.2;"; }
    h+='<span class="'+cls+'" style="'+st+'">'+esc(val)+'</span>';
  });

  // 선택항목 = 영표(○)
  var circle=function(p){ return '<span class="ov o" style="left:'+X(p[0])+'%;top:'+Y(p[1])
    +'%;font-size:'+fs(12)+'cqw;">○</span>'; };
  Object.keys(CO.checks||{}).forEach(function(field){
    if(FORM.checkVisible && !FORM.checkVisible(field,state)) return;
    var val=state[field]; if(!val) return;
    var pos=CO.checks[field][val]; if(pos) h+=circle(pos);
  });
  Object.keys(CO.attend||{}).forEach(function(field){ if(state[field]) h+=circle(CO.attend[field]); });

  // 신고일(오늘) — 제목 아래 ( 년 월 일 )
  var t=APP_TODAY||new Date(), td=FORM.today;
  if(td){
    var ds=function(x,val){ return '<span class="ov" style="left:'+X(x)+'%;top:'+Y(td.y)
      +'%;font-size:'+fs(7.5)+'cqw;">'+val+'</span>'; };
    h+=ds(td.yx,t.getFullYear())+ds(td.mx,t.getMonth()+1)+ds(td.dx,t.getDate());
  }

  document.querySelectorAll(".ovl").forEach(function(o){ o.innerHTML=h; });
}

/* 5) 우측 위저드 렌더 */
var el={};
function num(i){ return "①②③④⑤⑥⑦⑧⑨⑩".charAt(i); }

function inputHtml(f){
  var v=state[f.k]||"", req=f.req?'<span class="fb fb-req">필수</span>':'<span class="fb fb-opt">선택</span>';
  var cls="field"+(f.half?" half":"");
  var h='<div class="'+cls+'"><label class="field-label" for="in_'+f.k+'">'+esc(f.label)+req+'</label>';
  if(f.help) h+='<div class="q-help">'+esc(f.help)+'</div>';
  h+='<input class="text-input" id="in_'+f.k+'" data-f="'+f.k+'" data-t="'+(f.type||"text")+'" '
    +'value="'+esc(v)+'" '
    +(f.type==="jumin"||f.type==="phone"?'inputmode="numeric" ':'')+'autocomplete="off"></div>';
  return h;
}
function choiceHtml(field, opts, help){
  var h='';
  if(help) h+='<div class="q-help">'+esc(help)+'</div>';
  h+='<div class="opts row">';
  for(var i=0;i<opts.length;i++){
    var sel=state[field]===opts[i]?" sel":"";
    h+='<button type="button" class="opt'+sel+'" data-set="'+field+'" data-val="'+esc(opts[i])+'">'+esc(opts[i])+'</button>';
  }
  h+='</div>';
  return h;
}
function toggleHtml(field, label){
  var on=state[field]?" sel":"";
  return '<button type="button" class="opt'+on+'" data-toggle="'+field+'">'+(state[field]?"☑ ":"☐ ")+esc(label)+'</button>';
}
function sumRow(k,val){
  var empty=!val;
  return '<div class="sum-row"><span class="k">'+esc(k)+'</span>'
    +'<span class="val'+(empty?" empty":"")+'">'+(empty?"(비어 있음)":esc(val))+'</span></div>';
}

// 서식 config의 단계 body(API)에 넘길 헬퍼 묶음
var API={ get state(){return state;}, esc:esc, inputHtml:inputHtml, choiceHtml:choiceHtml,
  toggleHtml:toggleHtml, sumRow:sumRow, num:num, formatJumin:formatJumin, formatPhone:formatPhone };

function renderStepBody(step){
  var def=FORM.STEPS[step-1], h='';
  h+='<div class="coach-q">'+esc(def.q)+'</div>';
  if(def.why) h+='<div class="why-box"><span class="ic">💡</span><span>'+esc(def.why)+'</span></div>';
  if(def.body) h+=def.body(API);
  return h;
}

function renderStepper(){
  var cur=state.step, STEPS=FORM.STEPS, TOTAL=STEPS.length, h='';
  for(var i=0;i<TOTAL;i++){
    var n=i+1, cls="stp", inner=String(n);
    if(n<cur){ cls+=" done nav"; inner="✓"; }
    else if(n===cur){ cls+=" cur"; }
    var navAttr = n<cur ? ' data-goto="'+n+'" tabindex="0" role="button" aria-label="'+esc(STEPS[i].short)+' 단계로"' : '';
    h+='<div class="'+cls+'"><div class="stp-dot"'+navAttr+'>'+inner+'</div>'
      +'<div class="stp-lab">'+esc(STEPS[i].short)+'</div></div>';
  }
  el.stepper.innerHTML=h;
  el.stepper.setAttribute("aria-valuenow", cur);
}
function renderStep(){
  var def=FORM.STEPS[state.step-1], TOTAL=FORM.STEPS.length;
  el.wizTitle.textContent=def.title;
  el.wizCount.textContent=state.step+" / "+TOTAL+" 단계";
  el.wizBody.innerHTML=renderStepBody(state.step);
  el.stepWarn.textContent="";
  el.btnPrev.disabled = state.step===1;
  el.btnNext.textContent = state.step===TOTAL ? "인쇄하기 🖨️" : "다음 →";
  el.btnSkip.style.display = (def.kind==="intro"||def.kind==="summary") ? "none" : "block";
  renderStepper();
}
function renderAll(){ renderStep(); renderForm(); }

/* 6) 검증 · 네비게이션 */
function requiredMissing(step){
  var def=FORM.STEPS[step-1];
  return def.required ? (def.required(state)||[]) : [];
}
function goNext(){
  var TOTAL=FORM.STEPS.length;
  if(state.step===TOTAL){ window.print(); return; }
  var miss=requiredMissing(state.step);
  if(miss.length){
    el.stepWarn.textContent="다음 항목을 입력해 주세요: "+miss.join(", ");
    return;
  }
  state.step++; renderAll(); scrollTop();
}
function goPrev(){ if(state.step>1){ state.step--; renderAll(); scrollTop(); } }
function gotoStep(n){ if(n>=1 && n<state.step){ state.step=n; renderAll(); scrollTop(); } }
function skipStep(){ var TOTAL=FORM.STEPS.length; state.unsure[state.step]=true; if(state.step<TOTAL){ state.step++; renderAll(); scrollTop(); } }
function scrollTop(){ el.wizBody.scrollTop=0; window.scrollTo(0,0); }

/* 7) 이벤트 */
function onInput(e){
  var t=e.target, f=t.getAttribute("data-f"); if(!f) return;
  var typ=t.getAttribute("data-t"), val=t.value;
  if(typ==="jumin"){ val=t.value.replace(/\D/g,"").slice(0,13); state[f]=val; t.value=formatJumin(val);
    if(FORM.onJuminChange) FORM.onJuminChange(f, val, state);
  }
  else if(typ==="phone"){ val=t.value.replace(/\D/g,"").slice(0,11); state[f]=val; t.value=formatPhone(val); }
  else { state[f]=val; }
  renderForm();
}
function onBlurDate(e){
  var t=e.target; if(t.getAttribute("data-t")!=="date") return;
  var f=t.getAttribute("data-f"); state[f]=formatDateFlexible(state[f]); t.value=state[f]; renderForm();
}
function onClick(e){
  var t=e.target.closest("[data-set],[data-toggle],[data-next],[data-goto],[data-childinc]");
  if(!t) return;
  if(t.hasAttribute("data-set")){
    var k=t.getAttribute("data-set"), val=t.getAttribute("data-val");
    state[k]=(state[k]===val)?"":val;   // 같은 항목 다시 누르면 해제(토글)
    if((FORM.rerenderOnSet||[]).indexOf(k)>=0){ renderStep(); renderForm(); }
    else renderAll();
  }
  else if(t.hasAttribute("data-toggle")){ var kk=t.getAttribute("data-toggle"); state[kk]=!state[kk]; renderAll(); }
  else if(t.hasAttribute("data-next")){ goNext(); }
  else if(t.hasAttribute("data-goto")){ gotoStep(+t.getAttribute("data-goto")); }
  else if(t.hasAttribute("data-childinc")){
    var nc=(state.childCount||1)+(+t.getAttribute("data-childinc"));
    state.childCount=Math.max(1,Math.min(FORM.maxChild||4,nc)); renderAll();
  }
}
function onStepperKey(e){
  if(e.key!=="Enter"&&e.key!==" ") return;
  var t=e.target.closest("[data-goto]"); if(!t) return;
  e.preventDefault(); gotoStep(+t.getAttribute("data-goto"));
}

/* 미리보기 모달 */
function openPreview(){ renderForm(); document.body.classList.add("pv-open"); }
function closePreview(){ document.body.classList.remove("pv-open"); }

/* 초기화 / 예시 */
function resetAll(){
  if(confirm("입력한 모든 내용을 지우고 처음부터 다시 시작할까요?")){
    state=createEmptyState(); renderAll(); scrollTop();
  }
}
function fillSample(kind){
  state=createEmptyState();
  if(FORM.applySample) FORM.applySample(state, kind);
  renderAll(); scrollTop();
}

function bind(){
  el.wizBody.addEventListener("input", onInput);
  el.wizBody.addEventListener("blur", onBlurDate, true);
  el.wizBody.addEventListener("click", onClick);
  el.stepper.addEventListener("click", function(e){
    var t=e.target.closest("[data-goto]"); if(t) gotoStep(+t.getAttribute("data-goto"));
  });
  el.stepper.addEventListener("keydown", onStepperKey);
  el.btnNext.addEventListener("click", goNext);
  el.btnPrev.addEventListener("click", goPrev);
  el.btnSkip.addEventListener("click", skipStep);
  document.getElementById("btnReset").addEventListener("click", resetAll);
  var kinds=FORM.sampleKinds||["a","b"];
  document.getElementById("btnSampleAdult").addEventListener("click", function(){ fillSample(kinds[0]); });
  document.getElementById("btnSampleMinor").addEventListener("click", function(){ fillSample(kinds[1]); });
  document.getElementById("btnPrint").addEventListener("click", function(){ window.print(); });
  document.getElementById("btnPreview").addEventListener("click", openPreview);
  document.getElementById("btnPreviewMobile").addEventListener("click", openPreview);
  document.getElementById("btnCloseModal").addEventListener("click", closePreview);
  document.getElementById("modalBack").addEventListener("click", function(e){
    if(e.target===this) closePreview();
  });
}

/* 8) 초기화 */
function setText(id,txt){ var e=document.getElementById(id); if(e) e.textContent=txt; }
function setLabelHtml(id,html){ var e=document.getElementById(id); if(e) e.innerHTML=html; }
function init(){
  APP_TODAY=new Date();
  el.wizTitle=document.getElementById("wizTitle");
  el.wizCount=document.getElementById("wizCount");
  el.wizBody=document.getElementById("wizBody");
  el.stepWarn=document.getElementById("stepWarn");
  el.stepper=document.getElementById("stepper");
  el.btnPrev=document.getElementById("btnPrev");
  el.btnNext=document.getElementById("btnNext");
  el.btnSkip=document.getElementById("btnSkip");
  // 서식별 텍스트 주입
  document.title=FORM.docTitle;
  setText("docTitle", FORM.docTitle);
  setText("modalTitle", FORM.formName+" 미리보기");
  var labels=FORM.sampleLabels||["작성예시 1","작성예시 2"];
  setLabelHtml("btnSampleAdult", esc(labels[0])+'<span class="test-tag">테스트용</span>');
  setLabelHtml("btnSampleMinor", esc(labels[1])+'<span class="test-tag">테스트용</span>');
  document.querySelectorAll(".bg").forEach(function(img){ img.alt=FORM.formName; });
  var org=FORM.org||{orgName:"경기도 군포시", officeName:"군포시청 민원실"};
  setText("orgName", org.orgName);
  setText("today", formatDate(APP_TODAY));
  document.querySelectorAll(".bg").forEach(function(img){ img.src=FORM_IMG; });
  bind();
  renderAll();
  el.stepper.setAttribute("aria-valuemax", FORM.STEPS.length);
}
init();

</script>
</body>
