<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>좌표 편집기 — 민원실 작성 도우미</title>
<style>
  :root { --bd:#d0d5dd; --pri:#1e5fa8; --ok:#2e7d32; --warn:#c77700; --err:#c0392b; }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.5 'Malgun Gothic',sans-serif; background:#eef1f5; color:#1a1a1a; }
  header { display:flex; align-items:center; gap:14px; padding:8px 16px; background:#1a2b45; color:#fff; }
  header h1 { font-size:16px; margin:0; }
  header .hint { font-size:12px; opacity:.7; }
  header select, header button { font:inherit; }
  .toolbar { margin-left:auto; display:flex; align-items:center; gap:10px; }
  .toolbar button { padding:5px 10px; border:0; border-radius:5px; background:#37507a; color:#fff; cursor:pointer; }
  .toolbar button:hover { background:#4a6aa0; }
  .wrap { display:flex; height:calc(100vh - 45px); }

  /* 좌측 필드 목록 */
  .sidebar { width:220px; flex:none; background:#fff; border-right:1px solid var(--bd); overflow:auto; }
  .sidebar h2 { font-size:12px; text-transform:uppercase; letter-spacing:1px; color:#667; margin:14px 12px 6px; }
  .flist { list-style:none; margin:0; padding:0; }
  .flist li { padding:6px 12px; cursor:pointer; border-left:3px solid transparent; display:flex; gap:6px; align-items:baseline; }
  .flist li:hover { background:#f0f4fa; }
  .flist li.sel { background:#e5eefb; border-left-color:var(--pri); font-weight:600; }
  .flist .ty { font-size:10px; padding:1px 5px; border-radius:8px; background:#eceff4; color:#556; }
  .flist .ty.grid { background:#e8f0e8; color:var(--ok); }
  .flist .ty.check { background:#fdeede; color:var(--warn); }
  .flist .ty.addr { background:#e6e6fb; color:#5344a8; }
  .flist .req { color:var(--err); font-weight:700; }

  /* 캔버스 영역 */
  .stage { flex:1; overflow:auto; padding:20px; position:relative; }
  .canvas { position:relative; background:#fff; box-shadow:0 2px 16px rgba(0,0,0,.15); transform-origin:top left; }
  .canvas svg { display:block; width:100%; height:auto; pointer-events:none; }
  .refimg { position:absolute; top:0; left:0; pointer-events:none; z-index:1; }

  /* 참조(실제서식) 정렬 바 */
  .subbar { display:flex; align-items:center; gap:12px; padding:5px 16px; background:#f6f8fb;
            border-bottom:1px solid var(--bd); font-size:12px; color:#445; height:32px; }
  .subbar label { display:flex; align-items:center; gap:4px; }
  .subbar input[type=number] { width:56px; padding:2px 5px; border:1px solid var(--bd); border-radius:4px; font:inherit; }
  .subbar input[type=range] { width:110px; }
  .subbar .disabled { opacity:.4; pointer-events:none; }

  /* 필드 오버레이 박스 */
  .fbox { position:absolute; cursor:move; border:1.5px solid rgba(30,95,168,.5); background:rgba(30,95,168,.06); }
  .fbox:hover { border-color:var(--pri); background:rgba(30,95,168,.12); }
  .fbox.sel { border-color:var(--err); background:rgba(192,57,49,.10); box-shadow:0 0 0 1px var(--err); z-index:10; }
  .fbox .cellbox { display:inline-block; border:1px dashed rgba(0,0,0,.35); background:rgba(255,255,255,.35); vertical-align:top; }
  .fbox.gridbox { display:flex; align-items:center; border-style:dashed; background:transparent; padding:0; }
  .fbox.gridbox.sel { background:rgba(192,57,49,.06); }
  .handle { position:absolute; width:11px; height:11px; background:#fff; border:2px solid var(--err); border-radius:2px; z-index:12; }
  .handle.se { right:-6px; bottom:-6px; cursor:nwse-resize; }
  .handle.e  { right:-6px; top:50%; margin-top:-6px; cursor:ew-resize; }
  .handle.s  { bottom:-6px; left:50%; margin-left:-6px; cursor:ns-resize; }
  .flabel { position:absolute; top:-16px; left:0; font-size:10px; background:var(--err); color:#fff; padding:0 4px; border-radius:3px; white-space:nowrap; pointer-events:none; }

  /* 우측 속성 패널 */
  .props { width:270px; flex:none; background:#fff; border-left:1px solid var(--bd); overflow:auto; padding:14px; }
  .props h2 { font-size:13px; margin:0 0 4px; }
  .props .meta { font-size:12px; color:#667; margin-bottom:12px; word-break:break-all; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:8px 10px; }
  .fld { display:flex; flex-direction:column; gap:2px; }
  .fld label { font-size:11px; color:#556; }
  .fld input { padding:5px 7px; border:1px solid var(--bd); border-radius:5px; font:inherit; }
  .empty { color:#889; font-size:13px; padding:30px 6px; text-align:center; }
  .note { margin-top:14px; padding:8px 10px; border-radius:6px; font-size:12px; }
  .note.info { background:#eef4fc; color:#2b5788; }
  .note.warn { background:#fdf3e3; color:#8a5a00; }
  .coordsbox { width:100%; height:140px; margin-top:8px; font:11px/1.4 monospace; border:1px solid var(--bd); border-radius:6px; padding:8px; resize:vertical; }
  .status { position:fixed; left:50%; bottom:20px; transform:translateX(-50%); background:#1a2b45; color:#fff; padding:9px 18px; border-radius:22px; font-size:13px; opacity:0; transition:opacity .2s; pointer-events:none; z-index:100; }
  .status.show { opacity:1; }
  .status.err { background:var(--err); }
  .status.ok  { background:var(--ok); }
  kbd { background:#f0f0f3; border:1px solid #ccc; border-bottom-width:2px; border-radius:3px; padding:0 4px; font-size:11px; }
</style>
</head>
<body>
<header>
  <h1>좌표 편집기</h1>
  <select id="schemaSel" aria-label="스키마 선택"></select>
  <span class="hint">드래그=이동 · 핸들=크기 · <kbd>←↑↓→</kbd>=1px · <kbd>Shift</kbd>+화살표=10px</span>
  <div class="toolbar">
    <span id="zoomVal">100%</span>
    <button id="zoomOut" title="축소">−</button>
    <button id="zoomIn" title="확대">+</button>
    <button id="copyBtn">JSON 복사</button>
    <button id="saveBtn" style="background:#2e7d32;">스키마 파일에 저장</button>
  </div>
</header>

<div class="subbar" id="subbar">
  <label><input type="checkbox" id="refOn"> 실제 서식 겹쳐보기</label>
  <span id="refCtl" class="disabled">
    투명도 <input type="range" id="refOp" min="10" max="95" value="55">
    · 배율 <input type="number" id="refScale" value="100" step="0.5">%
    · X <input type="number" id="refDx" value="0" step="1">
    · Y <input type="number" id="refDy" value="0" step="1">
    <span id="refMissing" style="color:var(--err);display:none;"> — 참조 이미지 없음</span>
  </span>
</div>

<div class="wrap">
  <nav class="sidebar">
    <h2>필드 목록</h2>
    <ul class="flist" id="flist"></ul>
  </nav>

  <div class="stage" id="stage">
    <div class="canvas" id="canvas"></div>
  </div>

  <aside class="props" id="props">
    <div class="empty">필드를 선택하면<br>좌표를 편집할 수 있습니다.</div>
  </aside>
</div>

<div class="status" id="status"></div>

<!-- 스키마 모듈 (registration 에 필요한 최소 의존성) -->
<script src="../src/core/state.js"></script>
<script src="../src/lib/validate.js"></script>
<script src="../src/schemas/index.js"></script>
<script src="../src/schemas/passport.js"></script>
<script src="../src/schemas/family.js"></script>
<script src="../src/schemas/land.js"></script>
<script src="../src/schemas/seal.js"></script>

<script>
'use strict';
(function () {
  const App = window.App;
  const $ = (s, el) => (el || document).querySelector(s);
  const canvas = $('#canvas'), stage = $('#stage'), flist = $('#flist'),
        props = $('#props'), statusEl = $('#status'), zoomValEl = $('#zoomVal');

  const ED = { schemaId: null, sel: null, zoom: 1, boxes: {},
               ref: { on: false, opacity: 0.55, scale: 100, dx: 0, dy: 0 } };

  // 스키마 bg → 실제 서식 스캔(정렬 참조용). dev 전용, dist 미포함.
  const REF = { passport: '../draft/official_p0.png' };

  // 편집 대상: 배경(bg)과 필드가 있는 스키마만
  const editable = App.schemaOrder.filter(id => {
    const s = App.schemas[id];
    return s && s.bg && s.fields && s.fields.length;
  });

  const GEOM = { // 타입별 편집 가능한 기하 키
    grid:  ['x', 'y', 'cells', 'cellW', 'gap', 'h', 'sep'],
    text:  ['x', 'y', 'w', 'h'],
    addr:  ['x', 'y', 'w', 'h'],
    check: ['x', 'y', 'w', 'h']
  };
  const geomKeys = f => GEOM[f.type] || GEOM.text;
  const schema = () => App.schemas[ED.schemaId];

  function toast(msg, kind) {
    statusEl.textContent = msg;
    statusEl.className = 'status show ' + (kind || '');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => statusEl.classList.remove('show'), 2600);
  }

  // ── 부팅: 배경 SVG 로드 ──────────────────────────────────
  const bgs = [...new Set(editable.map(id => App.schemas[id].bg))];
  Promise.all(bgs.map(bg =>
    fetch('../src/assets/' + bg + '.svg')
      .then(r => { if (!r.ok) throw new Error(bg + '.svg'); return r.text(); })
      .then(t => { App.assets = App.assets || {}; App.assets[bg] = t; })
  )).then(init).catch(err => {
    canvas.innerHTML = '<p style="padding:30px;color:#c0392b">SVG 로드 실패: ' + err.message +
      '<br>정적 서버로 열어야 합니다: <code>node tools/dev-server.js</code> → ' +
      '<code>http://localhost:5173/tools/coord-editor.html</code></p>';
  });

  function init() {
    const sel = $('#schemaSel');
    sel.innerHTML = editable.map(id =>
      `<option value="${id}">${App.schemas[id].title}</option>`).join('');
    sel.addEventListener('change', () => loadSchema(sel.value));

    $('#zoomIn').onclick = () => setZoom(ED.zoom + 0.1);
    $('#zoomOut').onclick = () => setZoom(ED.zoom - 0.1);
    $('#copyBtn').onclick = copyJSON;
    $('#saveBtn').onclick = saveToFile;
    document.addEventListener('keydown', onKeydown);
    wireRefControls();

    loadSchema(editable[0]);
  }

  // ── 실제 서식 겹쳐보기(정렬 참조) ─────────────────────────
  function wireRefControls() {
    const on = $('#refOn'), ctl = $('#refCtl');
    on.addEventListener('change', () => {
      ED.ref.on = on.checked;
      ctl.classList.toggle('disabled', !on.checked);
      renderCanvas();
    });
    const bind = (id, key, isFloat) => $(id).addEventListener('input', (e) => {
      ED.ref[key] = isFloat ? parseFloat(e.target.value) : parseInt(e.target.value, 10);
      applyRefStyle();
    });
    bind('#refOp', 'opacity');   // 0~1 로 정규화는 applyRefStyle 에서
    bind('#refScale', 'scale', true);
    bind('#refDx', 'dx');
    bind('#refDy', 'dy');
  }

  function applyRefStyle() {
    const img = $('#refimg', canvas);
    if (!img) return;
    const s = schema();
    const op = $('#refOp'); ED.ref.opacity = (op ? +op.value : 55) / 100;
    img.style.opacity = ED.ref.opacity;
    img.style.width = (s.paper.w * (ED.ref.scale / 100)) + 'px';
    img.style.left = ED.ref.dx + 'px';
    img.style.top = ED.ref.dy + 'px';
  }

  function setZoom(z) {
    ED.zoom = Math.max(0.4, Math.min(2, +z.toFixed(2)));
    canvas.style.transform = 'scale(' + ED.zoom + ')';
    zoomValEl.textContent = Math.round(ED.zoom * 100) + '%';
  }

  // ── 스키마 로드 & 렌더 ────────────────────────────────────
  function loadSchema(id) {
    ED.schemaId = id; ED.sel = null;
    const s = schema();
    canvas.style.width = s.paper.w + 'px';
    canvas.style.height = s.paper.h + 'px';
    $('#refMissing').style.display = REF[s.bg] ? 'none' : 'inline';
    renderCanvas();
    renderList();
    renderProps();
  }

  function renderCanvas() {
    const s = schema();
    ED.boxes = {};
    canvas.innerHTML = App.assets[s.bg] || '';
    // 정렬 참조 이미지(있고 켜졌을 때) — SVG 위, 필드 박스 아래
    if (ED.ref.on && REF[s.bg]) {
      const img = document.createElement('img');
      img.className = 'refimg'; img.id = 'refimg'; img.src = REF[s.bg]; img.alt = '';
      canvas.appendChild(img);
      applyRefStyle();
    }
    s.fields.forEach(f => {
      const box = buildBox(f);
      canvas.appendChild(box);
      ED.boxes[f.id] = box;
    });
    if (ED.sel) markSelected();
  }

  // 필드 하나의 오버레이 박스 (render.js 배치를 그대로 반영)
  function buildBox(f) {
    const box = document.createElement('div');
    box.className = 'fbox';
    box.style.left = f.x + 'px';
    box.style.top = f.y + 'px';
    box.dataset.fid = f.id;

    if (f.type === 'grid') {
      box.classList.add('gridbox');
      box.style.height = f.h + 'px';
      for (let i = 0; i < f.cells; i++) {
        const c = document.createElement('div');
        c.className = 'cellbox';
        c.style.width = f.cellW + 'px';
        c.style.height = f.h + 'px';
        c.style.marginRight = f.gap + 'px';
        if (f.sep && i === f.sep) c.style.marginLeft = '12px';
        box.appendChild(c);
      }
    } else {
      box.style.width = f.w + 'px';
      box.style.height = f.h + 'px';
    }

    box.addEventListener('mousedown', (e) => startDrag(e, f, box, 'move'));
    box.addEventListener('click', (e) => { e.stopPropagation(); select(f.id); });
    return box;
  }

  function addHandles(f, box) {
    const mk = (cls) => { const h = document.createElement('div'); h.className = 'handle ' + cls;
      h.addEventListener('mousedown', (e) => { e.stopPropagation(); startDrag(e, f, box, cls); }); box.appendChild(h); };
    const lbl = document.createElement('div');
    lbl.className = 'flabel'; lbl.textContent = f.label || f.id; box.appendChild(lbl);
    if (f.type === 'grid') { mk('e'); mk('s'); }   // e=cellW, s=h
    else mk('se');                                  // se=w,h
  }

  // ── 선택 ──────────────────────────────────────────────────
  function select(id) {
    ED.sel = id;
    markSelected();
    renderList();
    renderProps();
    ED.boxes[id] && ED.boxes[id].scrollIntoView({ block: 'nearest', inline: 'nearest' });
  }
  function markSelected() {
    Object.values(ED.boxes).forEach(b => {
      b.classList.remove('sel');
      b.querySelectorAll('.handle,.flabel').forEach(h => h.remove());
    });
    const box = ED.boxes[ED.sel];
    if (!box) return;
    box.classList.add('sel');
    addHandles(schema().fields.find(x => x.id === ED.sel), box);
  }
  canvas.addEventListener('mousedown', (e) => { if (e.target === canvas) { /* 배경 클릭은 유지 */ } });

  // ── 드래그 (이동/리사이즈) ────────────────────────────────
  function startDrag(e, f, box, mode) {
    e.preventDefault();
    if (ED.sel !== f.id) select(f.id);
    const sx = e.clientX, sy = e.clientY;
    const o = { x: f.x, y: f.y, w: f.w, h: f.h, cellW: f.cellW };
    const z = ED.zoom;

    function move(ev) {
      const dx = Math.round((ev.clientX - sx) / z);
      const dy = Math.round((ev.clientY - sy) / z);
      if (mode === 'move') { f.x = o.x + dx; f.y = o.y + dy; }
      else if (mode === 'se') { f.w = Math.max(8, o.w + dx); f.h = Math.max(8, o.h + dy); }
      else if (mode === 'e')  { f.cellW = Math.max(6, o.cellW + dx); }
      else if (mode === 's')  { f.h = Math.max(8, o.h + dy); }
      syncBox(f);
    }
    function up() { document.removeEventListener('mousemove', move); document.removeEventListener('mouseup', up); }
    document.addEventListener('mousemove', move);
    document.addEventListener('mouseup', up);
  }

  // 필드 데이터 → 기존 박스에 반영(재생성 없이 위치/크기만)
  function syncBox(f) {
    const box = ED.boxes[f.id];
    if (!box) return;
    box.style.left = f.x + 'px';
    box.style.top = f.y + 'px';
    if (f.type === 'grid') {
      box.style.height = f.h + 'px';
      box.querySelectorAll('.cellbox').forEach((c, i) => {
        c.style.width = f.cellW + 'px';
        c.style.height = f.h + 'px';
        c.style.marginRight = f.gap + 'px';
        c.style.marginLeft = (f.sep && i === f.sep) ? '12px' : '';
      });
    } else {
      box.style.width = f.w + 'px';
      box.style.height = f.h + 'px';
    }
    syncPropsInputs(f);
  }

  // ── 키보드 미세 이동 ──────────────────────────────────────
  function onKeydown(e) {
    if (!ED.sel) return;
    if (/^(INPUT|SELECT|TEXTAREA)$/.test(document.activeElement.tagName)) return;
    const map = { ArrowLeft: ['x', -1], ArrowRight: ['x', 1], ArrowUp: ['y', -1], ArrowDown: ['y', 1] };
    const m = map[e.key];
    if (!m) return;
    e.preventDefault();
    const f = schema().fields.find(x => x.id === ED.sel);
    f[m[0]] += m[1] * (e.shiftKey ? 10 : 1);
    syncBox(f);
  }

  // ── 좌측 목록 ─────────────────────────────────────────────
  function renderList() {
    flist.innerHTML = schema().fields.map(f => `
      <li class="${f.id === ED.sel ? 'sel' : ''}" data-fid="${f.id}">
        <span class="ty ${f.type}">${f.type}</span>
        <span>${(f.label || f.id)}${f.required ? ' <span class="req">*</span>' : ''}</span>
      </li>`).join('');
    flist.querySelectorAll('li').forEach(li =>
      li.addEventListener('click', () => select(li.dataset.fid)));
  }

  // ── 우측 속성 패널 ────────────────────────────────────────
  function renderProps() {
    const f = ED.sel && schema().fields.find(x => x.id === ED.sel);
    if (!f) { props.innerHTML = '<div class="empty">필드를 선택하면<br>좌표를 편집할 수 있습니다.</div>'; return; }
    const keys = geomKeys(f);
    props.innerHTML = `
      <h2>${f.label || f.id}</h2>
      <div class="meta">id: <b>${f.id}</b> · type: ${f.type}${f.group ? ' · group: ' + f.group : ''}</div>
      <div class="grid2">
        ${keys.map(k => `
          <div class="fld">
            <label for="p_${k}">${k}</label>
            <input id="p_${k}" type="number" data-k="${k}" value="${f[k] != null ? f[k] : ''}" step="1">
          </div>`).join('')}
      </div>
      ${f.type === 'grid' ? '<div class="note info">grid 폭 = cells×(cellW+gap)' +
        (f.sep ? ' + 구분자 12px' : '') + '. <b>sep</b>은 픽셀이 아닌 <b>칸 인덱스</b>입니다.</div>' : ''}
      <div class="note warn">저장 시 <code>src/schemas/${ED.schemaId}.js</code> 의
        해당 값들이 제자리 갱신됩니다. (라벨·가이드·검증 로직은 보존)</div>
      <label style="display:block;margin-top:14px;font-size:11px;color:#556;">이 스키마 전체 좌표(JSON)</label>
      <textarea class="coordsbox" id="coordsView" readonly>${buildCoordsJSON()}</textarea>`;
    props.querySelectorAll('input[data-k]').forEach(inp =>
      inp.addEventListener('input', () => {
        const k = inp.dataset.k, v = inp.value === '' ? 0 : Number(inp.value);
        if (Number.isNaN(v)) return;
        f[k] = v;
        // cells 변경 시 셀 개수가 바뀌므로 박스 재생성
        if (k === 'cells' || k === 'sep') { renderCanvas(); markSelected(); }
        else syncBox(f);
        refreshCoordsView();
      }));
  }

  // 패널 input 값을 현재 필드값과 동기화(드래그/키보드 반영)
  function syncPropsInputs(f) {
    if (ED.sel !== f.id) return;
    geomKeys(f).forEach(k => { const inp = $('#p_' + k, props); if (inp) inp.value = f[k] != null ? f[k] : ''; });
    refreshCoordsView();
  }
  function refreshCoordsView() { const t = $('#coordsView', props); if (t) t.value = buildCoordsJSON(); }

  // ── 좌표 추출/내보내기 ────────────────────────────────────
  function buildCoords() {
    const out = {};
    schema().fields.forEach(f => {
      const o = {};
      geomKeys(f).forEach(k => { if (f[k] != null) o[k] = f[k]; });
      out[f.id] = o;
    });
    return out;
  }
  function buildCoordsJSON() { return JSON.stringify(buildCoords(), null, 2); }

  function copyJSON() {
    const txt = buildCoordsJSON();
    navigator.clipboard.writeText(txt)
      .then(() => toast('좌표 JSON을 클립보드에 복사했습니다', 'ok'))
      .catch(() => toast('복사 실패 — 우측 텍스트를 직접 선택해 복사하세요', 'err'));
  }

  function saveToFile() {
    fetch('/__save-coords', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ schemaId: ED.schemaId, coords: buildCoords() })
    })
      .then(r => r.json())
      .then(res => {
        if (!res.ok) throw new Error(res.error || '알 수 없는 오류');
        let msg = `저장 완료 — ${res.file} (${res.patched.length}개 필드 갱신)`;
        if (res.missedFields.length) msg += ` · 소스에 없는 필드: ${res.missedFields.join(', ')}`;
        if (res.missedKeys.length) msg += ` · 미적용 키: ${res.missedKeys.join(', ')}`;
        toast(msg, res.missedFields.length || res.missedKeys.length ? 'warn' : 'ok');
      })
      .catch(e => toast('저장 실패: ' + e.message + ' (dev-server 로 열었는지 확인)', 'err'));
  }
})();
</script>
</body>
</html>
