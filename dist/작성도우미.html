<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>민원실 신청서 작성 도우미</title>
<meta name="description" content="시청 민원실 신청서 작성 도우미 — 어르신 친화, 양식 위 작성, 무저장">
<style>
:root {
  --bg:#f4f6f9; --fg:#1a1a1a; --muted:#555;
  --primary:#1e5fa8; --primary-dark:#144a87; --primary-light:#e3f2fd;
  --border:#c8d0d8; --hi:#fff59d; --hi-soft:rgba(255,245,157,.3);
  --error:#d32f2f; --ok:#2e7d32; --warn:#ed6c02; --base:18px;
}
* { box-sizing:border-box; }
html, body {
  margin:0; padding:0;
  font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Malgun Gothic','Segoe UI',sans-serif;
  font-size:var(--base); background:var(--bg); color:var(--fg);
  -webkit-font-smoothing:antialiased;
}
button { font-family:inherit; }

/* 포커스 가시성 (접근성) */
:focus-visible { outline:3px solid #ffb300; outline-offset:2px; }

/* 헤더 */
header {
  background:var(--primary); color:#fff; padding:14px 24px;
  display:flex; justify-content:space-between; align-items:center;
  position:sticky; top:0; z-index:50;
}
.hgroup { display:flex; align-items:baseline; }
header h1 { font-size:22px; margin:0; font-weight:700; cursor:pointer; }
header .crumb { font-size:16px; opacity:.85; margin-left:12px; }
.controls { display:flex; gap:10px; align-items:center; }
.controls .label { font-size:15px; opacity:.9; }
.ctl-btn {
  font-size:18px; padding:8px 14px; border:1px solid rgba(255,255,255,.4);
  background:rgba(255,255,255,.1); color:#fff; border-radius:6px; cursor:pointer; font-weight:600;
}
.ctl-btn:hover { background:rgba(255,255,255,.2); }

/* 버튼 */
.btn {
  font-size:18px; padding:12px 22px; border:2px solid var(--primary);
  background:#fff; color:var(--primary); border-radius:8px; cursor:pointer; font-weight:600; transition:all .15s;
}
.btn:hover { background:var(--primary-light); }
.btn.primary { background:var(--primary); color:#fff; }
.btn.primary:hover { background:var(--primary-dark); }
.btn.large { font-size:22px; padding:16px 32px; }
.btn.danger { border-color:var(--error); color:var(--error); }
.btn.danger:hover { background:#ffebee; }
.btn:disabled { opacity:.4; cursor:not-allowed; }

/* 시작 화면 */
.intro { max-width:1000px; margin:40px auto; padding:0 24px; text-align:center; }
.intro h2 { font-size:34px; color:var(--primary); margin-bottom:8px; }
.intro .sub { font-size:19px; color:var(--muted); }
.menu-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:18px; margin-top:36px; }
.menu-item {
  background:#fff; border:2px solid var(--border); border-radius:12px;
  padding:28px 22px; cursor:pointer; transition:all .2s; text-align:left;
}
.menu-item:hover { border-color:var(--primary); transform:translateY(-3px); background:#f8fbff; }
.menu-item.disabled { opacity:.55; cursor:not-allowed; }
.menu-item.disabled:hover { transform:none; background:#fff; border-color:var(--border); }
.menu-item h3 { font-size:22px; margin:0 0 8px; }
.menu-item p { font-size:16px; margin:0; color:var(--muted); line-height:1.5; }
.badge { display:inline-block; padding:3px 10px; font-size:13px; background:var(--primary); color:#fff; border-radius:4px; margin-bottom:10px; font-weight:600; }
.badge.soon { background:#999; }
.badge.simple { background:var(--ok); }

/* 작성 화면 — 2단 위저드 (좌: 실시간 서식 / 우: 단계별 안내·입력) */
.wiz { display:grid; grid-template-columns:1fr 460px; gap:16px; padding:16px; height:calc(100vh - 60px); }

/* 좌: 서식 미리보기 */
.wiz-form { background:#e9edf2; border:1px solid var(--border); border-radius:8px; display:flex; flex-direction:column; overflow:hidden; }
.wiz-form-bar { display:flex; justify-content:space-between; align-items:center; padding:10px 16px; border-bottom:1px solid var(--border); background:#fff; }
.wiz-form-bar .title { font-size:16px; font-weight:600; color:var(--primary); }
.zoom-ctl { display:flex; gap:8px; align-items:center; }
.zoom-ctl .zlabel { font-size:14px; color:#666; }
.zoom-ctl #zoomVal { min-width:48px; text-align:center; font-weight:600; }
.zoom-ctl .ctl-btn { background:var(--primary-light); color:var(--primary); border:1px solid var(--primary); font-size:15px; padding:6px 12px; }
.wiz-canvas-scroll { flex:1; overflow:auto; display:flex; justify-content:center; padding:14px; }
.canvas-sizer { flex:none; }
.form-canvas { position:relative; width:794px; height:1123px; background:#fff; transform-origin:top left; box-shadow:0 2px 12px rgba(0,0,0,.15); }
.form-canvas svg { display:block; width:794px; height:1123px; }

/* 좌: 값 배치(정적 텍스트, 읽기 전용) */
#gridLayer, #valueLayer { position:absolute; inset:0; pointer-events:none; }
/* 앱이 그리는 규칙적 격자칸 (칸 = 값 위치) */
.gcell { position:absolute; border:1px solid #9aa3ad; box-sizing:border-box; border-radius:1px; }
.pv { position:absolute; color:#111; font-weight:600; white-space:nowrap; line-height:1; }
.pv-cell { transform:translate(-50%,-50%); }
.pv-text { transform:translateY(-50%); font-size:14px; font-weight:500; overflow:hidden; text-overflow:ellipsis; }
.pv-check { transform:translate(-50%,-50%); color:var(--primary); font-weight:800; }

/* 좌: 현재 단계 위치 강조 */
#stepHighlight { position:absolute; display:none; border:2.5px solid var(--warn); border-radius:4px;
  background:rgba(255,193,7,.14); pointer-events:none; box-shadow:0 0 0 3px rgba(255,193,7,.18); transition:all .2s; }

/* 우: 단계별 안내·입력 패널 */
.wiz-panel { background:#fff; border:1px solid var(--border); border-radius:8px; padding:22px 24px; overflow-y:auto; display:flex; flex-direction:column; }
.step-top { display:flex; justify-content:space-between; align-items:center; }
.dots { display:flex; gap:6px; }
.dot { width:11px; height:11px; border-radius:50%; background:#d4dae2; }
.dot.done { background:#9ec5e8; }
.dot.on { background:var(--primary); box-shadow:0 0 0 3px rgba(30,95,168,.2); }
.step-count { font-size:15px; color:var(--muted); font-weight:600; }
.step-title { font-size:26px; color:var(--primary); margin:14px 0 10px; }
.step-title .req { font-size:15px; color:var(--error); font-weight:700; vertical-align:middle; }
.step-help { background:#f2f7fc; border-left:4px solid var(--primary); border-radius:0 8px 8px 0;
  padding:14px 16px; font-size:16px; line-height:1.7; color:#2a3f57; }
.step-controls { margin-top:18px; flex:1; }

/* 입력 컨트롤 (큰 글씨) */
.q { margin-bottom:22px; }
.q-label { font-size:19px; font-weight:700; color:#222; margin-bottom:6px; display:block; }
.q-label .req { color:var(--error); }
.q-help { font-size:15px; color:var(--muted); line-height:1.6; margin-bottom:10px; }
.q-help .q-ex { color:var(--primary); font-weight:600; }
.q-input { width:100%; font-size:22px; font-family:inherit; padding:12px 14px; border:2px solid var(--border);
  border-radius:8px; outline:none; transition:all .12s; }
.q-input:focus { border-color:var(--primary); box-shadow:0 0 0 4px rgba(30,95,168,.18); }
.q-input.err { border-color:var(--error); background:#fff5f5; }
.q-warn { margin-top:8px; font-size:14px; color:#8a5a00; background:#fff3e0; border-radius:6px; padding:8px 12px; line-height:1.5; }

/* 선택지(라디오) 버튼 */
.opts { display:flex; flex-wrap:wrap; gap:10px; }
.opt { font-size:19px; font-family:inherit; padding:14px 22px; border:2px solid var(--border);
  background:#fff; color:#333; border-radius:10px; cursor:pointer; font-weight:600; transition:all .12s; }
.opt:hover { border-color:var(--primary); background:#f4f9ff; }
.opt.on { border-color:var(--primary); background:var(--primary); color:#fff; box-shadow:0 2px 8px rgba(30,95,168,.3); }
.opt:disabled { opacity:.45; cursor:not-allowed; background:#f2f4f7; color:#999; border-color:#e0e4e9; box-shadow:none; }
.opt:disabled:hover { border-color:#e0e4e9; background:#f2f4f7; }
.q-disabled .q-label { color:#999; }

/* 단계 네비 */
.step-err { color:var(--error); font-size:15px; line-height:1.7; margin:4px 0; }
.step-err div { margin:2px 0; }
.step-nav { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-top:18px; padding-top:16px; border-top:1px solid #eee; }
.step-progress { text-align:center; font-size:15px; color:var(--muted); margin-top:12px; }
.step-progress strong { color:var(--primary); font-size:19px; }

/* 가이드 패널 */
.guide { background:#fff; border:1px solid var(--border); border-radius:8px; padding:22px; position:sticky; top:76px; height:fit-content; max-height:calc(100vh - 92px); overflow-y:auto; }
.guide-head { border-bottom:2px solid var(--primary); padding-bottom:10px; margin-bottom:14px; }
.guide-head .step { font-size:14px; color:var(--muted); }
.guide-head h2 { margin:4px 0 0; color:var(--primary); font-size:22px; }
.guide-section { margin:14px 0; }
.guide-section h3 { font-size:17px; margin:14px 0 6px; color:#333; }
.guide-section p, .guide-section li { line-height:1.7; font-size:16px; color:#333; }
.note { padding:12px 14px; border-radius:6px; margin:10px 0; font-size:16px; line-height:1.6; }
.note.warn { background:#fff3e0; border-left:4px solid var(--warn); }
.note.ok { background:#e8f5e9; border-left:4px solid var(--ok); }
.note.info { background:#e3f2fd; border-left:4px solid var(--primary); }
.example-box { background:#fafafa; border:1px dashed #aaa; padding:10px 14px; border-radius:6px; margin:8px 0; font-family:'Courier New',monospace; font-size:15px; line-height:1.7; }

/* 액션 바 */
.action-bar { position:sticky; bottom:0; background:#fff; border-top:2px solid var(--border); padding:14px 22px; display:flex; justify-content:space-between; align-items:center; margin:16px -18px -18px; z-index:10; }
.action-btns { display:flex; gap:10px; }
.progress { font-size:17px; color:var(--muted); }
.progress strong { color:var(--primary); font-size:22px; font-weight:700; }

/* 주소 팝업 */
.addr-popup { position:absolute; background:#fff; border:2px solid var(--primary); border-radius:6px; z-index:30; max-height:280px; overflow-y:auto; min-width:360px; font-size:15px; }
.addr-item { padding:10px 14px; border-bottom:1px solid #eee; cursor:pointer; }
.addr-item:hover, .addr-item:focus { background:var(--primary-light); outline:none; }
.addr-item .road { font-weight:600; color:var(--primary); }
.addr-item .jibun { color:var(--muted); font-size:14px; margin-top:2px; }

/* 모달 */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.55); display:flex; align-items:center; justify-content:center; z-index:100; }
.modal { background:#fff; border-radius:12px; padding:32px; max-width:720px; max-height:88vh; overflow-y:auto; width:92%; }
.modal h2 { margin:0 0 6px; color:var(--primary); font-size:26px; }
.modal .modal-sub { font-size:16px; color:var(--muted); margin-bottom:18px; }
.check-item { display:flex; gap:12px; align-items:flex-start; padding:14px 0; border-bottom:1px solid #eee; font-size:17px; }
.check-item .icon { font-size:22px; flex-shrink:0; width:28px; text-align:center; font-weight:700; }
.check-item.ok .icon { color:var(--ok); }
.check-item.warn .icon { color:var(--warn); }
.check-item.err .icon { color:var(--error); }
.check-item .text { line-height:1.5; }
.check-item .field-name { font-weight:600; }
.check-item .jump { background:none; border:1px solid var(--primary); color:var(--primary); font-size:14px; padding:4px 10px; border-radius:4px; cursor:pointer; margin-left:auto; }
.modal-actions { display:flex; gap:12px; margin-top:22px; flex-wrap:wrap; justify-content:flex-end; }

/* 발급 화면 */
.finish-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin:18px 0; }
.finish-card { border:2px solid var(--border); border-radius:10px; padding:20px; text-align:left; cursor:pointer; background:#fff; transition:all .15s; font-family:inherit; font-size:inherit; color:inherit; }
.finish-card:hover { border-color:var(--primary); background:var(--primary-light); }
.finish-card h3 { margin:0 0 6px; font-size:19px; color:var(--primary); }
.finish-card p { margin:0; font-size:15px; color:var(--muted); line-height:1.5; }

/* 인쇄 — 좌측 서식(SVG+값)만 A4 실측 크기로 출력 */
@media print {
  header, .wiz-panel, .wiz-form-bar, .modal-overlay { display:none !important; }
  .wiz { display:block; padding:0; height:auto; }
  .wiz-form { border:none; background:#fff; overflow:visible; display:block; }
  .wiz-canvas-scroll { overflow:visible; padding:0; display:block; }
  .canvas-sizer { width:794px !important; height:1123px !important; }
  .form-canvas { transform:none !important; box-shadow:none !important; }
  #stepHighlight { display:none !important; }
  .pv { color:#000 !important; }
  .pv-check { color:#000 !important; }
  body { background:#fff; }
}

/* 반응형 — 좁은 화면에서는 세로 스택(안내가 위) */
@media (max-width:1100px) {
  .wiz { grid-template-columns:1fr; height:auto; }
  .wiz-panel { order:-1; }
  .wiz-form { min-height:60vh; }
}

</style>
</head>

<a href="#app" class="skip-link" style="position:absolute;left:-999px;">본문 바로가기</a>
<div id="app" role="application" aria-label="신청서 작성 도우미"></div>
<script>
'use strict';
window.App = window.App || {};

/* ===== src/core/state.js ===== */
'use strict';
/* ============================================================
 * state.js — 전역 애플리케이션 상태 (메모리 전용, 무저장)
 * ============================================================ */
(function (App) {

  const state = {
    view: 'intro',        // intro | form | finish
    schemaId: null,
    step: 0,              // 위저드 현재 단계
    data: {},             // { fieldId: value, groupId: selectedFieldId }
    errors: {},           // { fieldId: 'error message' }
    activeField: null,    // 현재 포커스된 필드 id (가이드 연동)
    zoom: 1.0,
    romanTouched: {},     // 사용자가 직접 수정한 자동완성 필드
    wizard: {},           // 스키마별 마법사 선택값 (예: 증명서 종류)
    idleTimer: null
  };

  App.state = state;

  // 작성 데이터만 초기화 (스키마 선택은 유지하지 않음)
  App.clearData = function () {
    state.data = {};
    state.errors = {};
    state.activeField = null;
    state.romanTouched = {};
    state.wizard = {};
    state.step = 0;
  };

  // 전체 초기화 → 시작 화면
  App.resetAll = function () {
    App.clearData();
    state.schemaId = null;
    state.view = 'intro';
    if (App.closeModal) App.closeModal();
    if (App.render) App.render();
  };

})(window.App = window.App || {});


/* ===== src/lib/romanize.js ===== */
'use strict';
/* ============================================================
 * romanize.js — 한글 → 로마자 변환
 * ------------------------------------------------------------
 *  - 외교부 여권 로마자 관용표기(성씨/이름 음절) 확장 매핑
 *  - 국립국어원 로마자 표기법(개정) 알고리즘 폴백

 *
 *  참고: 외교부는 신청인이 원하는 표기를 선택할 수 있게 하므로
 *  본 표는 "가장 널리 쓰이는 관용표기 제안값"이다. 최종 표기는
 *  사용자가 수정 가능하며(state.romanTouched), 가족 기존여권과의
 *  일관성을 우측 가이드에서 안내한다.
 * ============================================================ */
(function (App) {

  // ── 성씨 관용표기 (단성 + 복성) ────────────────────────────
  // 값이 배열이면 [대표표기, ...대안]. 대표표기를 기본 제안.
  const SURNAME_MAP = {

    '노':'NOH', '하':'HA', '곽':'KWAK', '성':'SUNG', '차':'CHA',
    '주':'JOO', '우':'WOO', '구':'KOO', '민':'MIN', '나':'NA',
    '진':'JIN', '지':'JI', '엄':'EOM', '채':'CHAE', '원':'WON',
    '천':'CHEON', '방':'BANG', '공':'KONG', '현':'HYUN', '함':'HAM',
    '변':'BYUN', '염':'YEOM', '여':'YEO', '추':'CHU', '도':'DO',
    '소':'SO', '석':'SEOK', '선':'SUN', '설':'SEOL', '마':'MA',
    '길':'KIL', '연':'YEON', '위':'WI', '표':'PYO', '명':'MYUNG',
    '기':'KI', '반':'BAN', '라':'RA', '왕':'WANG', '금':'KEUM',
    '옥':'OK', '육':'YUK', '인':'IN', '맹':'MAENG', '제':'JE',
    '모':'MO', '탁':'TAK', '국':'KOOK', '어':'EO', '은':'EUN',
    '편':'PYUN', '용':'YONG', '예':'YE', '봉':'BONG', '경':'KYUNG',
    '사':'SA', '부':'BOO', '가':'GA', '복':'BOK', '태':'TAE',
    '목':'MOK', '형':'HYUNG', '계':'GYE', '온':'ON', '좌':'JWA',
    '팽':'PAENG', '승':'SEUNG', '간':'GAN', '상':'SANG', '시':'SI',
    '대':'DAE', '풍':'PUNG', '후':'HOO', '초':'CHO', '필':'PIL',

    '감':'GAM', '갈':'GAL', '견':'GYEON', '당':'DANG', '화':'HWA',
    '창':'CHANG', '판':'PAN', '빙':'BING', '단':'DAN', '견':'GYEON',
    '삼':'SAM', '순':'SOON', '난':'NAN', '독':'DOK', '개':'GAE',
    '비':'BI', '뢰':'ROE', '내':'NAE', '뇌':'NOE', '학':'HAK',
    '흥':'HEUNG', '십':'SIP', '아':'A', '야':'YA', '묵':'MOOK',
    '점':'JEOM', '증':'JEUNG', '즙':'JEUP', '삭':'SAK', '빈':'BIN',
    '옹':'ONG', '내':'NAE', '초':'CHO', '누':'NOO', '망절':'MANGJEOL',
    // 복성(2자)
    '남궁':'NAMGOONG', '황보':'HWANGBO', '제갈':'JEGAL', '선우':'SUNWOO',
    '독고':'DOKKO', '사공':'SAGONG', '서문':'SEOMUN', '동방':'DONGBANG',
    '어금':'EOKEUM', '망절':'MANGJEOL', '강전':'KANGJEON', '소봉':'SOBONG',
    '사마':'SAMA'
  };

  // ── 이름 음절 관용표기 ─────────────────────────────────────
  // 알고리즘 결과보다 널리 통용되는 표기를 우선한다.
  // (음절 단위 제안 — 사용자가 언제든 수정 가능)
  const GIVEN_SYLLABLE_MAP = {

    '흠':'HEUM','흥':'HEUNG','희':'HEE','힐':'HIL'
  };

  // ── 국립국어원 로마자 표기법(개정) 알고리즘 ────────────────
  const CHO  = ['g','kk','n','d','tt','r','m','b','pp','s','ss','','j','jj','ch','k','t','p','h'];
  const JUNG = ['a','ae','ya','yae','eo','e','yeo','ye','o','wa','wae','oe','yo','u','wo','we','wi','yu','eu','ui','i'];
  const JONG = ['','k','k','kt','n','nt','nh','t','l','lk','lm','lp','lt','lt','lp','lh','m','p','ps','t','t','ng','t','t','k','t','p','t'];

  function syllableAlgo(ch) {
    const code = ch.charCodeAt(0) - 0xAC00;
    if (code < 0 || code > 11171) return '';
    const cho  = Math.floor(code / 588);
    const jung = Math.floor((code % 588) / 28);
    const jong = code % 28;
    return (CHO[cho] + JUNG[jung] + JONG[jong]).toUpperCase();
  }

  // 이름 한 음절 → 관용표기 우선, 없으면 알고리즘
  function romanizeSyllable(ch) {
    return GIVEN_SYLLABLE_MAP[ch] || syllableAlgo(ch);
  }

  /**
   * 성명 로마자 변환
   * @param {string} kor  한글 성명 (예: "홍길동", "남궁민수")
   * @param {object} [opt] { hyphen:boolean } 이름 음절 하이픈 연결 여부
   * @returns {string} "SURNAME, GIVEN" 형식
   */
  function romanizeName(kor, opt) {
    opt = opt || {};
    if (!kor) return '';
    kor = kor.replace(/\s+/g, '').trim();
    if (!kor) return '';

    // 복성(2자) 우선 매칭 → 단성
    let surname = '';
    let given = kor;
    if (kor.length >= 3 && SURNAME_MAP[kor.slice(0, 2)]) {
      surname = SURNAME_MAP[kor.slice(0, 2)];
      given = kor.slice(2);
    } else if (SURNAME_MAP[kor[0]]) {
      surname = SURNAME_MAP[kor[0]];
      given = kor.slice(1);
    }

    const parts = [];
    for (const ch of given) {
      const r = romanizeSyllable(ch);
      if (r) parts.push(r);
    }
    const givenRoman = parts.join(opt.hyphen ? '-' : '');

    if (surname && givenRoman) return surname + ', ' + givenRoman;
    if (surname) return surname;
    return givenRoman;
  }

  App.romanize = romanizeName;
  App.romanizeName = romanizeName;      // 별칭
  App.SURNAME_MAP = SURNAME_MAP;
  App.GIVEN_SYLLABLE_MAP = GIVEN_SYLLABLE_MAP;

})(window.App = window.App || {});

'use strict';
/* ============================================================
 * validate.js — 공통 검증기 / 포매터
 * ------------------------------------------------------------
 *  실제 여권 서식은 대부분 격자칸이며 "‘-’ 없이 숫자만 기재"를
 *  요구하므로 전화·주민번호는 숫자 문자열로 저장하고 검증한다.
 * ============================================================ */
(function (App) {

  const digits = (v) => String(v || '').replace(/\D/g, '');
  const upper  = (v) => String(v || '').toUpperCase();

  const validators = {
    // 공통
    required: (v) => (!v || !String(v).trim()) ? '필수 입력 항목입니다.' : null,

    // 한글 성명 (2~6자)
    nameKor: (v) => !v ? '한글 성명을 입력하세요.'
      : (!/^[가-힣]{1,6}$/.test(v) ? '한글로 최대 6자까지 입력하세요.' : null),

    // 주민등록번호 13자리 (숫자만)
    jumin: (v) => {
      const d = digits(v);
      if (d.length !== 13) return '주민등록번호 13자리를 정확히 입력하세요.';
      return null;
    },

    // 휴대전화 (숫자만, 10~11자리, 01x 시작)
    phone: (v) => {
      const d = digits(v);
      if (!/^01\d{8,9}$/.test(d)) return '휴대전화 번호를 정확히 입력하세요. (숫자만)';
      return null;
    },

    // 일반 전화 (숫자만, 9~11자리)
    tel: (v) => {
      const d = digits(v);
      if (d && !/^\d{9,11}$/.test(d)) return '전화번호를 숫자만 정확히 입력하세요.';
      return null;
    },

    // 로마자 (영대문자/공백/하이픈)
    roman: (v) => !v ? '로마자 성명을 입력하세요.'
      : (!/^[A-Z\s,\-]+$/.test(v) ? '영문 대문자로 입력하세요.' : null)
  };

  const formatters = {
    digits: digits,
    upper: upper,
    // 화면 표시용 주민번호 (000000-0000000)
    juminDisplay: (v) => {
      const d = digits(v).slice(0, 13);
      return d.length > 6 ? d.slice(0, 6) + '-' + d.slice(6) : d;
    },
    // 화면 표시용 휴대전화 (010-0000-0000)
    phoneDisplay: (v) => {
      const d = digits(v).slice(0, 11);
      if (d.length < 4) return d;
      if (d.length < 8) return d.slice(0, 3) + '-' + d.slice(3);
      return d.slice(0, 3) + '-' + d.slice(3, 7) + '-' + d.slice(7);
    }
  };

  App.validators = validators;
  App.formatters = formatters;
  App.digits = digits;

})(window.App = window.App || {});

'use strict';
/* ============================================================
 * juso.js — 도로명주소 검색 (행정안전부 주소정보누리집)
 * ------------------------------------------------------------
 *  운영 전환 절차 (과제 4):
 *   1) https://business.juso.go.kr 에서 "도로명주소 개발자센터"
 *      회원가입 → 신청 → 승인키(confmKey) 발급
 *   2) CONFIG.JUSO_KEY 에 발급키 입력, CONFIG.USE_DEMO = false
 *   3) API 방식 선택:
 *      (a) 서버 프록시  : 브라우저 → 자체 서버 → addrLinkApi (CORS 우회, 키 은닉)
 *      (b) 팝업 JS API : juso 팝업창에서 선택 → postMessage 로 수신 (키오스크 권장)
 *
 *  ※ addrLinkApi.do 는 브라우저 직접 호출 시 CORS 제한이 있어
 *    운영 배포에서는 (a) 서버 프록시 또는 (b) 팝업 방식을 권장한다.
 *    본 모듈은 세 경로(데모/프록시/팝업)의 골격을 모두 제공한다.
 * ============================================================ */
(function (App) {

  const CONFIG = {
    USE_DEMO: true,                 // 운영 시 false
    JUSO_KEY: '',                   // 발급 confmKey
    // (a) 서버 프록시 엔드포인트(자체 서버). 비어있으면 직접 호출 시도.
    PROXY_URL: '',                  // 예: '/api/juso'
    API_URL: 'https://business.juso.go.kr/addrlink/addrLinkApi.do',
    // (b) 팝업 방식
    POPUP_URL: 'https://business.juso.go.kr/addrlink/addrLinkUrl.do',
    countPerPage: 10
  };

  const DEMO_ADDR = [
    { road:'세종특별자치시 한누리대로 2130', jibun:'세종특별자치시 보람동 245', zip:'30151' },
    { road:'서울특별시 중구 세종대로 110', jibun:'서울특별시 중구 태평로1가 31', zip:'04524' },
    { road:'서울특별시 종로구 사직로 161', jibun:'서울특별시 종로구 세종로 1', zip:'03045' },
    { road:'경기도 군포시 청백리길 6', jibun:'경기도 군포시 산본동 1141', zip:'15845' },
    { road:'경기도 군포시 산본로 323', jibun:'경기도 군포시 산본동 1146', zip:'15807' },
    { road:'경기도 수원시 영통구 도청로 30', jibun:'경기도 수원시 영통구 이의동 1', zip:'16508' },
    { road:'부산광역시 연제구 중앙대로 1001', jibun:'부산광역시 연제구 연산동 1000', zip:'47545' },
    { road:'인천광역시 남동구 정각로 29', jibun:'인천광역시 남동구 구월동 1138', zip:'21554' },
    { road:'대전광역시 서구 둔산로 100', jibun:'대전광역시 서구 둔산동 1420', zip:'35242' },
    { road:'강원특별자치도 춘천시 중앙로 1', jibun:'강원특별자치도 춘천시 봉의동 15', zip:'24266' }
  ];

  // 통합 검색 진입점 — 콜백(cb)에 [{road, jibun, zip}] 전달
  function search(keyword, cb) {
    if (!keyword || keyword.trim().length < 2) { cb([]); return; }
    keyword = keyword.trim();

    if (CONFIG.USE_DEMO) {
      const r = DEMO_ADDR.filter(a => a.road.includes(keyword) || a.jibun.includes(keyword));
      setTimeout(() => cb(r), 120);
      return;
    }
    return searchReal(keyword, cb);
  }

  // 실연동: 프록시 우선, 없으면 직접 호출(CORS 실패 가능)
  function searchReal(keyword, cb) {
    const base = CONFIG.PROXY_URL || CONFIG.API_URL;
    const url = base +
      '?confmKey=' + encodeURIComponent(CONFIG.JUSO_KEY) +
      '&currentPage=1' +
      '&countPerPage=' + CONFIG.countPerPage +
      '&keyword=' + encodeURIComponent(keyword) +
      '&resultType=json';

    fetch(url)
      .then((r) => r.json())
      .then((j) => {
        const common = j && j.results && j.results.common;
        if (common && common.errorCode && common.errorCode !== '0') {
          console.warn('[juso] API 오류:', common.errorCode, common.errorMessage);
          cb([]); return;
        }
        const list = ((j.results && j.results.juso) || []).map((a) => ({
          road: a.roadAddr,
          jibun: a.jibunAddr,
          zip: a.zipNo
        }));
        cb(list);
      })
      .catch((err) => {
        console.warn('[juso] 직접 호출 실패(CORS 가능). 팝업/프록시 방식을 사용하세요.', err);
        cb([]);
      });
  }

  // (b) 팝업 방식: juso 창에서 선택 → onPick({road, jibun, zip})
  //  운영 시 별도 콜백 페이지(jusoPopup.html)와 postMessage 연동 필요.
  function openPopup(onPick) {
    if (CONFIG.USE_DEMO) {
      console.info('[juso] 데모 모드에서는 팝업 대신 인라인 검색을 사용합니다.');
      return;
    }
    const w = window.open('', 'jusoPopup', 'width=570,height=420,scrollbars=yes');
    const form = document.createElement('form');
    form.method = 'post';
    form.action = CONFIG.POPUP_URL;
    form.target = 'jusoPopup';
    form.innerHTML =
      '<input type="hidden" name="confmKey" value="' + CONFIG.JUSO_KEY + '">' +
      '<input type="hidden" name="returnUrl" value="' + location.origin + '/jusoPopup.html">' +
      '<input type="hidden" name="resultType" value="4">';
    document.body.appendChild(form);
    form.submit();
    document.body.removeChild(form);

    window._jusoOnPick = onPick;   // jusoPopup.html 콜백에서 사용
  }

  App.juso = { CONFIG, search, openPopup, DEMO_ADDR };

})(window.App = window.App || {});

          <h1 tabindex="0" role="button" onclick="App.goHome()" onkeydown="if(event.key==='Enter')App.goHome()">시청 민원실 작성 도우미</h1>
          ${crumb ? `<span class="crumb">› ${esc(crumb)}</span>` : ''}
        </div>
        <div class="controls">
          <span class="label">글자 크기</span>
          <button class="ctl-btn" onclick="App.changeFontSize(-2)" aria-label="글자 작게">가-</button>
          <button class="ctl-btn" onclick="App.changeFontSize(2)" aria-label="글자 크게">가+</button>
          ${state.view !== 'intro' ? '<button class="ctl-btn" onclick="App.confirmReset()">처음으로</button>' : ''}
        </div>
      </header>`;
  }

  // ── 시작 화면 ─────────────────────────────────────────────
  function renderIntro() {
    const items = App.schemaOrder.map((id) => {
      const s = App.schemas[id];
      const disabled = s.disabled ? 'disabled' : '';
      const attrs = s.disabled
        ? 'aria-disabled="true"'
        : `tabindex="0" role="button" onclick="App.selectSchema('${id}')" onkeydown="if(event.key==='Enter')App.selectSchema('${id}')"`;
      const badgeCls = s.disabled ? 'soon' : (s.badge === '약식' ? 'simple' : '');
      return `
        <div class="menu-item ${disabled}" ${attrs}>
          <span class="badge ${badgeCls}">${esc(s.badge || (s.disabled ? '준비중' : '정식'))}</span>
          <h3>${esc(s.title)}</h3>
          <p>${esc(s.sub || '')}</p>
        </div>`;
    }).join('');

    App.app.innerHTML = `
      ${renderHeader('')}
      <main class="intro">
        <h2>어떤 민원을 신청하시나요?</h2>
        <p class="sub">아래 신청서를 선택하시면 작성 도우미가 시작됩니다.<br>
        입력하신 내용은 화면에서만 사용되며 시청 시스템에 저장되지 않습니다.</p>
        <div class="menu-grid">${items}</div>
        <p class="sub" style="margin-top:36px;font-size:15px;">
          ※ 글자가 작게 보이시면 우측 상단 [가+] 버튼을 눌러 키우실 수 있습니다.
        </p>
      </main>`;
  }

  // ── 작성 화면 (2단 위저드) ────────────────────────────────
  function renderForm() {
    const s = schema();
    const svg = App.assets[s.bg] || '';
    App.app.innerHTML = `
      ${renderHeader(s.title)}
      <main class="wiz">
        <section class="wiz-form" aria-label="신청서 미리보기">
          <div class="wiz-form-bar">
            <div class="title">${esc(s.title)} · 미리보기</div>
            <div class="zoom-ctl">
              <span class="zlabel">화면 크기</span>
              <button class="ctl-btn" onclick="App.changeZoom(-0.1)" aria-label="화면 축소">축소</button>
              <span id="zoomVal">100%</span>
              <button class="ctl-btn" onclick="App.changeZoom(0.1)" aria-label="화면 확대">확대</button>
            </div>
          </div>
          <div class="wiz-canvas-scroll">
            <div class="canvas-sizer" id="canvasSizer">
              <div class="form-canvas" id="canvas">
                ${svg}
                <div id="gridLayer" aria-hidden="true"></div>
                <div id="valueLayer" aria-hidden="true"></div>
                <div id="stepHighlight"></div>
              </div>
            </div>
          </div>
        </section>
        <aside class="wiz-panel" id="wizPanel" aria-live="polite"></aside>
      </main>`;

    App.renderGridCells();
    App.renderValueLayer();
    App.gotoStep(state.step || 0);
    App.fitPreview();
    window.addEventListener('resize', App.fitPreview);
  }

  // ── 단계 필드 목록(원래 순서 유지) ────────────────────────
  App.stepFieldIds = function (step) {
    const s = schema();
    const ids = new Set(step.fields || []);
    (step.groups || []).forEach(g => s.fields.forEach(f => { if (f.group === g) ids.add(f.id); }));
    return s.fields.filter(f => ids.has(f.id)).map(f => f.id);   // 스키마 순서대로
  };
  App.stepOfField = function (fid) {
    const s = schema();
    for (let i = 0; i < s.steps.length; i++) {
      if (App.stepFieldIds(s.steps[i]).includes(fid)) return i;
    }
    return 0;
  };

  // ── 우측 단계 패널 ────────────────────────────────────────
  App.renderStep = function (i) {
    const s = schema(), steps = s.steps, st = steps[i];
    const last = i === steps.length - 1;
    const fields = st.fields ? st.fields.map(id => s.fields.find(f => f.id === id)) : [];
    const groups = st.groups || [];
    const rendered = new Set();
    let controls = '';

    App.stepFieldIds(st).forEach(fid => {
      const f = s.fields.find(x => x.id === fid);
      if (f.group) {
        if (rendered.has(f.group)) return;
        rendered.add(f.group);
        controls += groupControl(s, f.group);
      } else {
        controls += fieldControl(f);
      }
    });

    const dots = steps.map((_, k) =>
      `<span class="dot ${k === i ? 'on' : ''} ${k < i ? 'done' : ''}"></span>`).join('');

    $('wizPanel').innerHTML = `
      <div class="step-top">
        <div class="dots" aria-hidden="true">${dots}</div>
        <div class="step-count">단계 ${i + 1} / ${steps.length}</div>
      </div>
      <h2 class="step-title">${esc(st.title)}${st.required ? ' <span class="req">*필수</span>' : ''}</h2>
      <div class="step-help">${brk(st.help || '')}</div>
      <div class="step-controls">${controls}</div>
      <div class="step-err" id="stepErr"></div>
      <div class="step-nav">
        ${i > 0 ? '<button class="btn" onclick="App.prevStep()">← 이전</button>' : '<span></span>'}
        ${last
          ? '<button class="btn primary large" onclick="App.openReview()">작성 완료 · 검토하기</button>'
          : '<button class="btn primary large" onclick="App.nextStep()">다음 →</button>'}
      </div>
      <div class="step-progress">필수 항목 <strong>${App.countFilled()} / ${App.countRequired()}</strong> 작성 완료</div>`;

    App.wireStep(st);
    App.highlightStep(i);
  };

  function groupControl(s, g) {
    const members = s.fields.filter(f => f.group === g);
    const req = (s.requiredGroups || []).includes(g);
    const sel = state.data[g];
    const guide = (members[0] && members[0].guide) || {};
    const cond = s.groupCond && s.groupCond[g];
    const enabled = !cond || cond(state.data);
    const opts = members.map(m =>
      `<button type="button" class="opt ${sel === m.id ? 'on' : ''}" data-group="${g}" data-id="${m.id}"
        aria-pressed="${sel === m.id}" ${enabled ? '' : 'disabled'}>${esc(m.label)}</button>`).join('');
    return `
      <div class="q ${enabled ? '' : 'q-disabled'}" data-group="${g}">
        <div class="q-label">${esc((s.groupLabels || {})[g] || g)}${req ? '<span class="req"> *</span>' : ''}</div>
        ${enabled && guide.body ? `<div class="q-help">${esc(guide.body)}</div>` : ''}
        ${!enabled ? '<div class="q-help">여행증명서를 선택하면 활성화됩니다.</div>' : ''}
        <div class="opts">${opts}</div>
      </div>`;
  }

  function fieldControl(f) {
    const g = f.guide || {};
    const v = state.data[f.id] || '';
    const err = state.errors[f.id] ? 'err' : '';
    const maxlen = f.type === 'grid' ? ` maxlength="${f.cells}"` : (f.maxlength ? ` maxlength="${f.maxlength}"` : '');
    const im = f.digitsOnly ? ' inputmode="numeric"' : '';
    const ph = f.placeholder ? ` placeholder="${esc(f.placeholder)}"` : '';
    return `
      <div class="q" data-field="${f.id}">
        <label class="q-label" for="in_${f.id}">${esc(f.label)}${f.required ? '<span class="req"> *</span>' : ''}</label>
        ${g.body ? `<div class="q-help">${esc(g.body)}${g.example ? ` <b class="q-ex">${esc(g.example)}</b>` : ''}</div>` : ''}
        <input id="in_${f.id}" class="q-input ${err}" value="${esc(v)}"${maxlen}${im}${ph}
          autocomplete="off" spellcheck="false" aria-label="${esc(f.label)}">
        ${g.warn ? `<div class="q-warn">⚠ ${esc(g.warn)}</div>` : ''}
      </div>`;
  }

  // ── 좌측 서식에 값 배치(정적 텍스트) ──────────────────────
  App.cellLefts = function (f) {
    const arr = []; let cx = f.x;
    for (let i = 0; i < f.cells; i++) {
      if (f.sep && i === f.sep) cx += 12;
      arr.push(cx);
      cx += f.cellW + f.gap;
    }
    return arr;
  };
  App.cellCenters = function (f) {
    return App.cellLefts(f).map(lx => lx + f.cellW / 2);
  };

  // 격자칸을 규칙적으로 직접 그림(칸 = 값 위치, 동일 좌표 → 정렬 정확)
  App.renderGridCells = function () {
    const s = schema();
    let html = '';
    s.fields.forEach(f => {
      if (f.type !== 'grid') return;
      App.cellLefts(f).forEach(lx => {
        html += `<div class="gcell" style="left:${lx}px;top:${f.y}px;width:${f.cellW}px;height:${f.h}px;"></div>`;
      });
    });
    const el = $('gridLayer');
    if (el) el.innerHTML = html;
  };

  App.renderValueLayer = function () {
    const s = schema();
    let html = '';
    s.fields.forEach(f => {
      if (f.type === 'grid') {
        const v = String(state.data[f.id] || '');
        if (!v) return;
        const cx = App.cellCenters(f);
        const fs = Math.round(Math.min(f.cellW, f.h) * 0.72);
        for (let i = 0; i < f.cells && i < v.length; i++) {
          if (v[i] === ' ') continue;
          html += `<span class="pv pv-cell" style="left:${cx[i]}px;top:${f.y + f.h / 2}px;font-size:${fs}px;">${esc(v[i])}</span>`;
        }
      } else if (f.type === 'text') {
        const v = state.data[f.id] || '';
        if (!v) return;
        html += `<span class="pv pv-text" style="left:${f.x + 3}px;top:${f.y + f.h / 2}px;max-width:${(f.w || 200) - 6}px;">${esc(v)}</span>`;
      }
    });
    // 체크(그룹/단독) → 선택된 위치에 ✔
    (function () {
      const groups = {};
      s.fields.forEach(f => { if (f.type === 'check' && f.group) (groups[f.group] = groups[f.group] || []).push(f); });
      Object.keys(groups).forEach(g => {
        const selId = state.data[g];
        const f = selId && groups[g].find(x => x.id === selId);
        if (f) html += checkMark(f);
      });
      s.fields.forEach(f => { if (f.type === 'check' && !f.group && state.data[f.id]) html += checkMark(f); });
    })();
    const layer = $('valueLayer');
    if (layer) layer.innerHTML = html;
  };
  function checkMark(f) {
    return `<span class="pv pv-check" style="left:${f.x + f.w / 2}px;top:${f.y + f.h / 2}px;font-size:${Math.round(f.h * 1.05)}px;">✔</span>`;
  }

  // ── 현재 단계 위치 강조(좌측 서식) ────────────────────────
  App.highlightStep = function (i) {
    const s = schema(), st = s.steps[i];
    const fs = App.stepFieldIds(st).map(id => s.fields.find(f => f.id === id));
    if (!fs.length) { const h = $('stepHighlight'); if (h) h.style.display = 'none'; return; }
    let x0 = 1e9, y0 = 1e9, x1 = -1e9, y1 = -1e9;
    fs.forEach(f => {
      const w = f.type === 'grid' ? (f.cells * (f.cellW + f.gap) + (f.sep ? 12 : 0)) : (f.w || 14);
      const h = f.h || 14;
      x0 = Math.min(x0, f.x); y0 = Math.min(y0, f.y);
      x1 = Math.max(x1, f.x + w); y1 = Math.max(y1, f.y + h);
    });
    const pad = 6;
    const el = $('stepHighlight');
    if (!el) return;
    el.style.display = 'block';
    el.style.left = (x0 - pad) + 'px'; el.style.top = (y0 - pad) + 'px';
    el.style.width = (x1 - x0 + pad * 2) + 'px'; el.style.height = (y1 - y0 + pad * 2) + 'px';
  };

  // ── 진행률 ────────────────────────────────────────────────
  App.countRequired = function () {
    const s = schema();
    return s.fields.filter(f => f.required).length + (s.requiredGroups || []).length;
  };
  App.countFilled = function () {
    const s = schema();
    const f1 = s.fields.filter(f => f.required && String(state.data[f.id] || '').trim()).length;
    const g1 = (s.requiredGroups || []).filter(g => state.data[g]).length;
    return f1 + g1;
  };
  App.updateProgress = function () {
    const bar = document.querySelector('.step-progress');
    if (bar) bar.innerHTML = `필수 항목 <strong>${App.countFilled()} / ${App.countRequired()}</strong> 작성 완료`;
  };

  // ── 검토 모달 ─────────────────────────────────────────────
  App.openReview = function () {
    const s = schema();
    const results = [];

    (s.requiredGroups || []).forEach(g => {
      if (!state.data[g]) results.push({ status:'err', label:(s.groupLabels||{})[g] || g, msg:'선택되지 않았습니다.', target:g });
      else {
        const sel = s.fields.find(f => f.id === state.data[g]);
        results.push({ status:'ok', label:(s.groupLabels||{})[g] || g, msg:`[${sel ? sel.label : ''}] 선택됨` });
      }
    });

    s.fields.forEach(f => {
      if (f.type === 'check') return;
      const v = state.data[f.id] || '';
      if (f.required && !String(v).trim()) {
        results.push({ status:'err', label:f.label, msg:'입력되지 않았습니다.', target:f.id });
      } else if (f.validate) {
        const err = f.validate(v);
        if (err) results.push({ status:'err', label:f.label, msg:err, target:f.id });
        else if (v) results.push({ status:'ok', label:f.label, msg:'정상 입력됨' });
      } else if (v) {
        results.push({ status:'ok', label:f.label, msg:'입력됨' });
      }
    });

    (s.reviewNotes ? s.reviewNotes(state.data) : []).forEach(w =>
      results.push({ status:'warn', label:'안내', msg:w }));

    const hasError = results.some(r => r.status === 'err');
    const okN = results.filter(r => r.status === 'ok').length;
    const errN = results.filter(r => r.status === 'err').length;
    const warnN = results.filter(r => r.status === 'warn').length;

    const items = results.map(r => {
      const icon = r.status === 'ok' ? '✓' : (r.status === 'warn' ? '!' : '✗');
      const jump = r.target ? `<button class="jump" onclick="App.jumpTo('${r.target}')">이동</button>` : '';
      return `<div class="check-item ${r.status}"><div class="icon" aria-hidden="true">${icon}</div>
        <div class="text"><span class="field-name">${esc(r.label)}</span> — ${esc(r.msg)}</div>${jump}</div>`;
    }).join('');

    App.openModal('reviewModal', `
      <h2>${hasError ? '작성 내용을 확인해주세요' : '작성 내용 검토 완료'}</h2>
      <div class="modal-sub">정상 ${okN}건 · 오류 ${errN}건 · 안내 ${warnN}건</div>
      ${items}
      <div class="modal-actions">
        <button class="btn" onclick="App.closeModal()">계속 작성</button>
        <button class="btn primary large" onclick="App.goFinish()" ${hasError ? 'disabled' : ''}>
          ${hasError ? '오류 수정 후 진행 가능' : '발급 단계로 진행 →'}
        </button>
      </div>`);
  };

  App.jumpTo = function (idOrGroup) {
    App.closeModal();
    const step = App.stepOfField(idOrGroup);
    App.gotoStep(step);
    setTimeout(() => { const el = $('in_' + idOrGroup); if (el) el.focus(); }, 60);
  };

  // ── 발급 단계 ─────────────────────────────────────────────
  App.goFinish = function () {
    App.closeModal();
    App.openModal('finishModal', `
      <h2>작성이 완료되었습니다</h2>
      <div class="modal-sub">아래 방법 중 하나를 선택해주세요.</div>
      <div class="finish-grid">
        <button class="finish-card" onclick="App.doPrint('A4')"><h3>일반용지 프린터로 인쇄</h3>
          <p>A4 일반 용지에 출력합니다. 작성 확인용·임시 보관용에 적합합니다.</p></button>
        <button class="finish-card" onclick="App.doPrint('OFFICIAL')"><h3>신청서 전용 프린터로 인쇄</h3>
          <p>여권 신청서 전용 용지에 출력합니다. 접수 제출용입니다.</p></button>
        <button class="finish-card" onclick="App.doSavePDF()"><h3>PDF로 저장</h3>
          <p>USB·이메일로 가져가실 때 사용하세요. 댁에서 인쇄도 가능합니다.</p></button>
        <button class="finish-card" onclick="App.closeModal()"><h3>다시 검토하기</h3>
          <p>작성 내용을 한 번 더 확인하고 싶으시면 선택하세요.</p></button>
      </div>
      <div class="note warn" style="margin-top:18px;">
        <strong>인쇄 후 안내</strong><br>
        ① 출력물의 성명 옆에 검은색 펜으로 서명 또는 도장을 찍어주세요.<br>
        ② 사진(3.5×4.5cm, 6개월 이내)은 창구에서 부착합니다.<br>
        ③ 본인 신분증과 함께 접수 창구에 제출해주세요.
      </div>
      <div class="modal-actions">
        <button class="btn danger" onclick="App.confirmReset()">완료 후 화면 초기화</button>
      </div>`);
  };

  // ── 모달 유틸 ─────────────────────────────────────────────
  App.openModal = function (id, inner) {
    App.closeModal();
    const m = document.createElement('div');
    m.className = 'modal-overlay';
    m.id = id;
    m.setAttribute('role', 'dialog');
    m.setAttribute('aria-modal', 'true');
    m.innerHTML = `<div class="modal">${inner}</div>`;
    document.body.appendChild(m);
    const first = m.querySelector('button');
    if (first) first.focus();
  };
  App.closeModal = function () {
    document.querySelectorAll('.modal-overlay').forEach(m => m.remove());
  };

})(window.App = window.App || {});

'use strict';
/* ============================================================
 * a11y.js — 접근성: 격자칸 키보드 네비게이션 (과제 8 기반)
 * ------------------------------------------------------------
 *  - Backspace(빈 칸) → 이전 칸
 *  - ← / → → 칸 이동
 *  - Home / End → 첫 칸 / 마지막 칸
 *  - 체크(radio/checkbox) 포커스는 render 에서 tabindex·role·aria 부여
 * ============================================================ */
(function (App) {

  App.gridKeydown = function (e, f, i, c) {
    const cell = (n) => document.getElementById('f_' + f.id + '__' + n);

    switch (e.key) {
      case 'Backspace':
        if (!c.value) { const p = cell(i - 1); if (p) { p.focus(); e.preventDefault(); } }
        break;
      case 'ArrowLeft': {
        const p = cell(i - 1); if (p) { p.focus(); e.preventDefault(); } break;
      }
      case 'ArrowRight': {
        const n = cell(i + 1); if (n) { n.focus(); e.preventDefault(); } break;
      }
      case 'Home': { const h = cell(0); if (h) { h.focus(); e.preventDefault(); } break; }
      case 'End': { const t = cell(f.cells - 1); if (t) { t.focus(); e.preventDefault(); } break; }
      default: break;
    }
  };

})(window.App = window.App || {});


/* ===== src/core/app.js ===== */
'use strict';
/* ============================================================
 * app.js — 위저드 진행 · 입력 처리 · 자동완성 · 미리보기 · 인쇄 · 부팅
 * ============================================================ */
(function (App) {
  const state = App.state;
  const $ = (id) => document.getElementById(id);
  const schema = () => App.schemas[state.schemaId];

  // ── 스키마 선택 ───────────────────────────────────────────
  App.selectSchema = function (id) {
    const s = App.schemas[id];
    if (!s || s.disabled) return;
    state.schemaId = id;
    App.clearData();
    state.step = 0;
    state.view = 'form';
    App.render();
    App.resetIdleTimer();
  };

  // ── 단계 이동 ─────────────────────────────────────────────
  App.gotoStep = function (i) {
    const steps = schema().steps;
    state.step = Math.max(0, Math.min(steps.length - 1, i));
    App.renderStep(state.step);
    scrollToHighlight();
    App.resetIdleTimer();
  };
  function scrollToHighlight() {
    const hl = $('stepHighlight'), scroll = document.querySelector('.wiz-canvas-scroll');
    if (hl && scroll && hl.style.display !== 'none') {
      scroll.scrollTo({ top: Math.max(0, (parseFloat(hl.style.top) || 0) * state.zoom - 40), behavior: 'smooth' });
    }
  }
  App.nextStep = function () {
    if (!App.validateStep(state.step)) return;
    App.gotoStep(state.step + 1);
  };
  App.prevStep = function () { App.gotoStep(state.step - 1); };

  // 현재 단계의 필수/형식 검증 (통과 못하면 진행 차단)
  App.validateStep = function (i) {
    const s = schema(), st = s.steps[i];
    const problems = [];
    (st.groups || []).forEach(g => {
      if ((s.requiredGroups || []).includes(g) && !state.data[g]) {
        problems.push(`‘${(s.groupLabels || {})[g] || g}’를 선택해 주세요.`);
      }
    });
    App.stepFieldIds(st).forEach(fid => {
      const f = s.fields.find(x => x.id === fid);
      if (!f || f.group) return;
      const v = state.data[f.id] || '';
      if (f.required && !String(v).trim()) {
        problems.push(`‘${f.label}’를 입력해 주세요.`);
        markErr(f.id);
      } else if (v && f.validate) {
        const e = f.validate(v);
        if (e) { problems.push(`‘${f.label}’: ${e}`); markErr(f.id); }
      }
    });
    const box = $('stepErr');
    if (problems.length) {
      if (box) box.innerHTML = problems.map(p => `<div>• ${App.esc(p)}</div>`).join('');
      return false;
    }
    if (box) box.innerHTML = '';
    return true;
  };
  function markErr(id) {
    state.errors[id] = true;
    const el = $('in_' + id);
    if (el) el.classList.add('err');
  }

  // ── 이벤트 배선 (현재 단계 컨트롤) ────────────────────────
  App.wireStep = function (st) {
    const s = schema();
    document.querySelectorAll('#wizPanel .opt').forEach(btn => {
      btn.addEventListener('click', () => App.onRadio(btn.dataset.group, btn.dataset.id));
    });
    document.querySelectorAll('#wizPanel .q-input').forEach(el => {
      const f = s.fields.find(x => x.id === el.id.slice(3));
      if (!f) return;
      el.addEventListener('input', () => App.onInput(f, el));
      el.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); App.nextStep(); } });
    });
  };

  // ── 입력 처리 ─────────────────────────────────────────────
  App.onRadio = function (g, id) {
    const s = schema();
    state.data[g] = id;
    // 조건부 그룹 정리: 조건이 거짓이 된 그룹의 선택 해제
    if (s.groupCond) {
      Object.keys(s.groupCond).forEach(cg => {
        if (!s.groupCond[cg](state.data)) delete state.data[cg];
      });
    }
    // 현재 단계 재렌더(활성/비활성·선택 반영) — 스크롤은 하지 않음
    App.renderStep(state.step);
    App.renderValueLayer();
    App.updateProgress();
    App.resetIdleTimer();
  };

  App.onInput = function (f, el) {
    let v = el.value;
    if (f.digitsOnly) v = v.replace(/\D/g, '');
    if (f.upper) v = v.toUpperCase();
    if (f.type === 'grid') v = v.slice(0, f.cells);
    if (v !== el.value) el.value = v;
    state.data[f.id] = v;
    delete state.errors[f.id];
    el.classList.remove('err');
    App.onValueChanged(f);
    App.renderValueLayer();
    App.updateProgress();
    App.resetIdleTimer();
  };

  // 값 세팅(자동완성) — 상태 + (렌더돼 있으면) 입력창 반영
  App.setInputValue = function (id, val) {
    const f = schema().fields.find(x => x.id === id);
    if (!f) return;
    let v = String(val || '');
    if (f.upper) v = v.toUpperCase();
    if (f.digitsOnly) v = v.replace(/\D/g, '');
    if (f.type === 'grid') v = v.slice(0, f.cells);
    state.data[id] = v;
    const el = $('in_' + id);
    if (el) el.value = v;
  };

  // ── 자동완성 (한글성명 → 로마자 / 서명란) ─────────────────
  App.onValueChanged = function (f) {
    const d = state.data;
    if (f.id === 'romanSur' || f.id === 'romanGiven') state.romanTouched.roman = true;

    if (f.id === 'nameKor') {
      if (!state.romanTouched.roman && App.romanizeName) {
        const r = App.romanizeName(d.nameKor || '');
        const parts = r.split(',');
        App.setInputValue('romanSur', (parts[0] || '').trim());
        App.setInputValue('romanGiven', (parts[1] || '').trim().replace(/-/g, ''));
      }
      App.setInputValue('signName1', d.nameKor || '');
      App.setInputValue('signName2', d.nameKor || '');
    }
  };

  // ── 화면 유틸 ─────────────────────────────────────────────
  App.goHome = function () {
    if (state.view === 'intro') return;
    if (confirm('작성 중인 내용이 모두 사라집니다. 처음 화면으로 가시겠습니까?')) App.resetAll();
  };
  App.confirmReset = function () {
    if (confirm('정말로 초기화하시겠습니까? 작성하신 내용은 모두 삭제됩니다.')) App.resetAll();
  };

  App.changeFontSize = function (delta) {
    const root = document.documentElement;
    const cur = parseInt(getComputedStyle(root).getPropertyValue('--base')) || 18;
    root.style.setProperty('--base', Math.max(14, Math.min(28, cur + delta)) + 'px');
  };

  // ── 미리보기 확대/축소 ────────────────────────────────────
  function applyZoom() {
    const c = $('canvas'), sizer = $('canvasSizer'), z = state.zoom;
    if (c) c.style.transform = 'scale(' + z + ')';
    if (sizer) { sizer.style.width = (794 * z) + 'px'; sizer.style.height = (1123 * z) + 'px'; }
    const lbl = $('zoomVal'); if (lbl) lbl.textContent = Math.round(z * 100) + '%';
  }
  App.changeZoom = function (delta) {
    state.zoom = Math.max(0.4, Math.min(1.6, +(state.zoom + delta).toFixed(2)));
    applyZoom();
  };
  App.fitPreview = function () {
    const scroll = document.querySelector('.wiz-canvas-scroll');
    if (!scroll) return;
    const avail = scroll.clientWidth - 20;
    state.zoom = Math.max(0.4, Math.min(1.3, +(avail / 794).toFixed(2)));
    applyZoom();
  };

  // ── 인쇄 ─────────────────────────────────────────────────
  App.doPrint = function (type) {
    alert(type === 'A4'
      ? '인쇄 창에서 [일반용지 프린터]를 선택해주세요.'
      : '인쇄 창에서 [신청서 전용 프린터]를 선택해주세요.');
    App.closeModal();
    setTimeout(() => window.print(), 200);
  };
  App.doSavePDF = function () {
    alert('인쇄 창에서 프린터를 [PDF로 저장]으로 선택해주세요.');
    App.closeModal();
    setTimeout(() => window.print(), 200);
  };

  // ── 유휴 자동 초기화 (보안) ───────────────────────────────
  App.resetIdleTimer = function () {
    if (state.idleTimer) clearTimeout(state.idleTimer);
    state.idleTimer = setTimeout(() => {
      if (state.view !== 'intro') {
        alert('3분간 입력이 없어 보안을 위해 화면을 초기화합니다.');
        App.resetAll();
      }
    }, 3 * 60 * 1000);
  };

  // ── 부팅 ─────────────────────────────────────────────────
  App.start = function () {
    App.app = document.getElementById('app');
    App.render();
    App.resetIdleTimer();
    window.addEventListener('afterprint', () => {
      setTimeout(() => {
        if (confirm('인쇄가 완료되었습니까?\n\n[확인]을 누르시면 화면이 초기화됩니다.')) App.resetAll();
      }, 500);
    });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') App.closeModal(); });
  };

})(window.App = window.App || {});
