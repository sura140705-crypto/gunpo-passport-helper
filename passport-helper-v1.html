<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>여권발급신청서 작성 미리보기 도우미</title>
<!--
  여권발급신청서(여권법 시행규칙 별지 제1호서식, 2026.6.1 개정) 작성 미리보기 도우미
  - 단일 HTML 파일 · 외부 서버/라이브러리/CDN/폰트/이미지 없음
  - 입력값은 브라우저 메모리에서만 처리 · 저장(localStorage 등) 안 함 · 새로고침 시 소멸
  - 좌: 실제 서식을 재현한 신청서 (실시간 반영) / 우: 단계별 간단 입력
  - 작성 보조·미리보기용 (공식 접수 가능 여부 미보장)
-->
<style>
  :root{
    --blue:#1b5fc0; --blue-dark:#164e9e; --blue-light:#eaf1fb;
    --line:#d5d9df; --bg:#f2f4f7; --muted:#5b626c; --ink:#1a1c1f;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;background:var(--bg);color:var(--ink);
    font-family:"Malgun Gothic","맑은 고딕",system-ui,-apple-system,sans-serif;
    font-size:17px;line-height:1.55;
  }

  /* ===== 상단 바 ===== */
  .topbar{
    display:flex;flex-wrap:wrap;align-items:center;gap:12px 20px;
    padding:14px 20px;background:#fff;border-bottom:2px solid var(--blue);
    position:sticky;top:0;z-index:20;
  }
  .brand{display:flex;flex-direction:column;margin-right:auto;}
  .brand h1{margin:0;font-size:20px;color:var(--blue-dark);}
  .brand .meta{font-size:14px;color:var(--muted);}
  .actions{display:flex;gap:10px;flex-wrap:wrap;}
  .btn{font-family:inherit;font-size:16px;font-weight:600;border:1.5px solid var(--blue);
    background:#fff;color:var(--blue);border-radius:10px;padding:11px 16px;cursor:pointer;}
  .btn:hover{background:var(--blue-light);}
  .btn.primary{background:var(--blue);color:#fff;}
  .btn.primary:hover{background:var(--blue-dark);}
  .btn.ghost{border-color:var(--line);color:var(--muted);}
  .btn.ghost:hover{background:var(--bg);}
  .btn:disabled{opacity:.45;cursor:default;}
  .test-tag{font-size:12px;color:#b26a00;background:#fff3e0;border:1px solid #ffd79a;
    border-radius:6px;padding:2px 6px;margin-left:6px;}

  /* ===== 2단 레이아웃 ===== */
  .layout{display:flex;gap:22px;align-items:flex-start;padding:22px;max-width:1380px;margin:0 auto;}
  .form-col{flex:1 1 auto;min-width:0;}
  .panel-col{flex:0 0 400px;width:400px;}

  /* ===== 좌측: 실제 서식 재현 ===== */
  /* 실제 서식 이미지 위에 값을 얹는 방식 (A4 규격 · 컬러 인쇄) */
  .paper{background:#fff;box-shadow:0 3px 14px rgba(0,0,0,.10);width:210mm;margin:0 auto;
    -webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .stage{position:relative;width:100%;container-type:inline-size;}
  .stage .bg{display:block;width:100%;height:auto;}
  .ovl{position:absolute;inset:0;pointer-events:none;}
  /* 얹는 글자 = 검은 펜 느낌 */
  .ov{position:absolute;transform:translate(-50%,-50%);color:#111;font-weight:700;line-height:1;white-space:nowrap;}
  .ov.k{color:#000;font-weight:900;}          /* 체크 ✔ */
  .ov.t{transform:translateY(-50%);}           /* 좌측정렬 자유 텍스트(세로중앙; wrap 2줄도 칸 중앙) */
  .cover{position:absolute;background:#fff;pointer-events:none;
        -webkit-print-color-adjust:exact;print-color-adjust:exact;}  /* 원본 인쇄 안내문 완전히 가림 */
  .guide{position:absolute;transform:translateY(-50%);color:#c4c4c4;font-weight:400;white-space:nowrap;line-height:1;pointer-events:none;
        -webkit-print-color-adjust:exact;print-color-adjust:exact;}  /* 옅은 색으로 균일하게 다시 그린 안내문 */
  .ovhl{position:absolute;background:rgba(27,95,192,.12);outline:1.6px solid #1b5fc0;border-radius:2px;pointer-events:none;}
  /* 형광펜 하이라이트(서명란): 항상 표시, 인쇄에도 유지. multiply로 밑 글자 살림 */
  .ovhi{position:absolute;background:rgba(255,232,0,.55);border-radius:4px;pointer-events:none;
    mix-blend-mode:multiply;-webkit-print-color-adjust:exact;print-color-adjust:exact;}

  /* 미리보기 모달 */
  .modal-back{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;display:flex;flex-direction:column;padding:14px;}
  .modal-box{display:flex;flex-direction:column;height:100%;max-width:100%;margin:0 auto;}
  .modal-top{display:flex;justify-content:space-between;align-items:center;color:#fff;gap:10px;padding:4px 2px 10px;}
  .modal-top b{font-size:18px;}
  .modal-scroll{flex:1;overflow:auto;display:flex;justify-content:center;background:#5a5a5a;padding:12px;border-radius:8px;}
  .modal-scroll .paper{width:min(210mm,94vw);height:max-content;box-shadow:0 4px 20px rgba(0,0,0,.4);}

  /* ===== 우측: 모바일형 입력 패널 ===== */
  .phone{background:#fff;border:1px solid var(--line);border-radius:22px;
    box-shadow:0 6px 22px rgba(0,0,0,.08);overflow:hidden;}
  .phone-head{background:var(--blue);color:#fff;padding:16px 18px;}
  .wiz-title{font-size:20px;font-weight:700;}
  .wiz-count{font-size:14px;opacity:.9;margin-top:3px;}
  /* 8단계 스텝퍼: 원 노드 + 연결선, 완료=✓, 현재=강조 */
  .stepper{display:flex;margin-top:14px;}
  .stp{flex:1;display:flex;flex-direction:column;align-items:center;position:relative;min-width:0;}
  .stp+.stp::before{content:"";position:absolute;top:12px;right:50%;width:100%;height:3px;
    background:rgba(255,255,255,.30);z-index:0;}
  .stp.done::before,.stp.cur::before{background:#fff;}            /* 지나온 구간 = 흰 연결선 */
  .stp-dot{position:relative;z-index:1;width:26px;height:26px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;
    background:rgba(255,255,255,.25);color:#fff;border:2px solid transparent;
    transition:transform .15s,background .15s;}
  .stp.done .stp-dot{background:#fff;color:var(--blue);}
  .stp.cur .stp-dot{background:#fff;color:var(--blue-dark);border-color:#bfe0ff;
    transform:scale(1.18);box-shadow:0 0 0 4px rgba(255,255,255,.28);}
  .stp-lab{font-size:10px;line-height:1.2;margin-top:5px;text-align:center;
    color:rgba(255,255,255,.72);white-space:nowrap;max-width:100%;overflow:hidden;text-overflow:ellipsis;}
  .stp.cur .stp-lab{color:#fff;font-weight:700;}
  .stp.nav .stp-dot{cursor:pointer;}        /* 지나온 단계는 눌러서 되돌아가기 */
  .stp.nav .stp-dot:hover{background:#eaf3ff;}
  .wiz-body{padding:18px;max-height:calc(100vh - 300px);overflow:auto;}

  .coach-q{font-size:22px;font-weight:800;line-height:1.35;margin-bottom:10px;}
  .why-box{display:flex;gap:8px;font-size:16px;color:#1c4e86;background:#eef6ff;
    border:1px solid #cfe2f7;border-radius:10px;padding:11px 13px;margin-bottom:14px;line-height:1.6;}
  .why-box .ic{flex:none;}
  details.terms{margin-bottom:14px;border:1px dashed var(--line);border-radius:10px;padding:2px 12px;background:#fff;}
  details.terms summary{cursor:pointer;font-size:14px;font-weight:700;color:var(--blue-dark);padding:9px 0;}
  details.terms .term{font-size:14px;color:#333;padding:7px 0;border-top:1px solid #eef1f5;line-height:1.55;}

  .fb{font-size:12.5px;border-radius:6px;padding:2px 8px;font-weight:700;vertical-align:middle;white-space:nowrap;}
  .fb-req{color:#c0392b;background:#fdecec;border:1px solid #f3b4b4;}
  .fb-opt{color:#5b626c;background:#eef1f5;border:1px solid #d5d9df;}

  .field{margin-bottom:20px;}
  .field-label{display:block;font-size:17px;font-weight:700;margin-bottom:9px;}
  .q-help{font-size:15px;color:var(--muted);margin:-2px 0 10px;line-height:1.5;}
  .opts{display:flex;flex-direction:column;gap:10px;}
  .opt{display:flex;flex-direction:column;align-items:stretch;font-family:inherit;text-align:left;
    padding:16px 18px;border:1.5px solid var(--line);background:#fff;color:var(--ink);border-radius:12px;cursor:pointer;}
  .opt:hover{border-color:var(--blue);}
  .opt.selected{border-color:var(--blue);background:var(--blue-light);}
  .opt-main{display:flex;align-items:center;gap:8px;}
  .opt-check{color:var(--blue);font-weight:800;visibility:hidden;}
  .opt.selected .opt-check{visibility:visible;}
  .opt-label{font-size:18px;font-weight:600;}
  .opt.selected .opt-label{color:var(--blue-dark);}
  .opt-rec{font-size:12px;color:#0a7a2f;background:#e7f6ec;border:1px solid #b6e3c4;border-radius:6px;padding:2px 8px;margin-left:auto;}
  .opt-desc{font-size:15px;color:var(--muted);margin-top:6px;line-height:1.45;}
  .opt.selected .opt-desc{color:#2c5aa0;}

  .text-input{width:100%;font-family:inherit;font-size:19px;padding:15px 16px;
    border:1.5px solid var(--line);border-radius:12px;background:#fff;}
  .text-input:focus{outline:none;border-color:var(--blue);}
  .hint{font-size:13.5px;color:var(--muted);margin-top:7px;line-height:1.5;}

  .warn-strong{background:#fdecec;border:1px solid #f0a5a5;color:#a11c1c;border-radius:10px;
    padding:12px 14px;font-size:14px;line-height:1.6;margin-bottom:14px;}
  .note-box{background:#fff8e6;border:1px solid #ffe19a;color:#7a5600;border-radius:10px;
    padding:12px 14px;font-size:14px;margin-bottom:14px;line-height:1.55;}
  .info-box{background:var(--blue-light);border:1px solid #bcd3f2;color:var(--blue-dark);
    border-radius:10px;padding:12px 14px;font-size:15px;margin-bottom:14px;line-height:1.6;}
  .unsure-note{background:#fff8e6;border:1px solid #ffe19a;color:#7a5600;border-radius:10px;
    padding:10px 12px;font-size:13.5px;margin-bottom:14px;}
  .sug-box{background:#f0f7ff;border:1px solid #bcd3f2;border-radius:10px;padding:12px 14px;margin-bottom:14px;}
  .sug-title{font-weight:700;font-size:14px;margin-bottom:8px;color:var(--blue-dark);}
  .sug-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px;font-size:15px;}
  .sug-row b{font-size:17px;letter-spacing:1px;}
  .sug-btn{font-family:inherit;font-size:13px;border:1.5px solid var(--blue);background:#fff;
    color:var(--blue);border-radius:8px;padding:6px 10px;cursor:pointer;}
  .sug-btn:hover{background:var(--blue);color:#fff;}
  .sug-note{font-size:13px;color:var(--muted);margin-top:4px;line-height:1.5;}

  .dunno-btn{width:100%;margin-top:4px;font-family:inherit;font-size:15px;font-weight:600;
    color:var(--muted);background:#f4f6f9;border:1.5px dashed var(--line);border-radius:12px;padding:13px;cursor:pointer;}
  .dunno-btn:hover{border-color:var(--blue);color:var(--blue);background:#fff;}

  /* 확인·완료 단계 */
  .sum-list{border:1px solid var(--line);border-radius:12px;overflow:hidden;margin-bottom:14px;}
  .sum-row{display:flex;gap:10px;padding:10px 14px;border-top:1px solid #eef1f5;font-size:15px;}
  .sum-row:first-child{border-top:none;}
  .sum-row .k{flex:0 0 130px;color:var(--muted);font-weight:600;}
  .sum-row .v{flex:1;font-weight:600;}
  .sum-row .v.empty{color:#c0392b;font-weight:600;}
  .staff-list{background:#fffaf0;border:1px solid #e0b36a;border-radius:10px;padding:12px 14px;margin-bottom:14px;font-size:14px;color:#7a5600;}
  .staff-list .st{font-weight:700;margin-bottom:4px;}
  .staff-list ul{margin:6px 0 0;padding-left:20px;}
  .staff-list.ok{background:#f1faf3;border-color:#9cc7a6;color:#1e6b34;}

  .step-warn{margin:0 18px 14px;background:#fdecec;border:1px solid #f5b5b5;color:#a12727;border-radius:10px;padding:10px 12px;font-size:13.5px;}
  .step-warn:empty{display:none;}
  .wiz-nav{display:flex;gap:12px;padding:16px 18px;border-top:1px solid var(--line);}
  .wiz-nav .btn{flex:1;padding:16px;font-size:17px;}

  .screen-notice{margin-top:16px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px 18px;font-size:13px;color:#444;}
  .screen-notice h3{margin:0 0 8px;font-size:15px;color:var(--blue-dark);}
  .screen-notice ul{margin:0;padding-left:18px;}
  .screen-notice li{margin:4px 0;}

  /* 모바일 전용: 코치 안에서 완성된 서식을 확인하는 버튼 (넓은 화면에선 숨김) */
  .m-preview{display:none;width:calc(100% - 36px);margin:0 18px 4px;
    font-family:inherit;font-size:16px;font-weight:600;
    border:1.5px solid var(--blue);background:#fff;color:var(--blue);
    border-radius:10px;padding:12px;cursor:pointer;}
  .m-preview:hover{background:var(--blue-light);}

  /* ===== 반응형 =====
     넓은 화면(민원실 PC 등) = 좌(서식)+우(코치) 2단.
     좁은 화면(어르신 스마트폰 등) = 우측 코치만, 좌측 서식은 숨기고 [미리보기]로 확인. */
  @media (max-width:860px){
    .layout{flex-direction:column;gap:14px;padding:12px;}
    .form-col{display:none;}                 /* 모바일: 좌측 서식 숨김 */
    .panel-col{order:1;width:100%;flex-basis:auto;position:static;}
    .wiz-body{max-height:none;}
    .m-preview{display:block;}                /* 모바일 전용 미리보기 버튼 노출 */
    /* 상단바 간결화 */
    .brand h1{font-size:17px;}
    #btnSampleAdult,#btnSampleMinor,#btnFlip{display:none;}   /* 테스트용 작성예시·좌우버튼은 모바일에서 숨김 */
  }
  /* 넓은 화면 좌우 배치: 기본=입력란 좌측(서식 우측), [좌우 바꾸기] 시 서식 좌측 */
  @media (min-width:861px){
    .layout{flex-direction:row-reverse;}           /* 기본: 코치(입력란) 왼쪽 */
    body.form-left .layout{flex-direction:row;}     /* 반전: 서식 왼쪽 */
    /* 스크롤 주도권: 입력 콘솔(패널)이 메인 스크롤, 서식은 화면에 고정된 채 자체 스크롤(따라감).
       → 휠은 콘솔이 먼저 먹고, 서식은 제자리에 고정되어 필요 시 서식 위에서만 자체 스크롤 */
    .form-col{position:sticky;top:86px;align-self:flex-start;
      max-height:calc(100vh - 100px);overflow-y:auto;overflow-x:hidden;}
  }

  /* ===== 인쇄: 서식 이미지+값만, A4 꽉 채움 ===== */
  @media print{
    @page{size:A4 portrait;margin:0;}
    html,body{background:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    .topbar,.panel-col,.screen-notice,.modal-top,.ovhl{display:none !important;}
    .layout{display:block;padding:0;margin:0;max-width:none;}
    .form-col{display:block !important;width:100%;position:static;max-height:none;overflow:visible;}   /* 모바일에서 숨겼어도 인쇄 시 서식 표시(화면용 고정·스크롤 해제) */
    /* 미리보기 모달이 열려 있으면 그 안의 서식을, 아니면 좌측 서식을 인쇄 */
    .modal-back{position:static;background:none;padding:0;display:block;}
    .modal-box{height:auto;}
    .modal-scroll{overflow:visible;background:none;padding:0;}
    .paper{box-shadow:none !important;width:100% !important;margin:0;}
    .ov{color:#000 !important;}
    /* 모달이 열려 있으면 좌측 원본은 인쇄에서 제외(중복 방지) */
    body.pv-open .form-col{display:none !important;}
    /* 첨부서류(동의서/위임장)는 새 쪽(2쪽)에서 시작 */
    body.needs-consent .consent-page,body.needs-proxy .proxy-page{page-break-before:always;break-before:page;}
    .modal-scroll .consent-page,.modal-scroll .proxy-page{margin-top:0;}
  }

  /* ===== 어르신 가독성 강화(2026-07-09): 큰 글씨·고대비·또렷한 포커스 ===== */
  :root{ --muted:#495059; }                     /* 보조텍스트 대비 강화(회색을 더 진하게) */
  .wiz-count{font-size:15px;opacity:.95;}
  .why-box{font-size:17px;}
  .q-help{font-size:16px;}
  .opt-label{font-size:19px;}
  .opt-desc{font-size:16px;}
  .opt-rec{font-size:13px;}
  .hint{font-size:15.5px;}
  .info-box{font-size:16px;}
  .warn-strong{font-size:15.5px;}
  .note-box{font-size:15.5px;}
  .unsure-note{font-size:15px;}
  .step-warn{font-size:15px;}
  .sum-row{font-size:16.5px;}
  .staff-list{font-size:15px;}
  details.terms summary{font-size:15.5px;}
  details.terms .term{font-size:15.5px;}
  .sug-title{font-size:15px;}
  .sug-row{font-size:16px;}
  .sug-note{font-size:14.5px;}
  .sug-btn{font-size:15px;padding:9px 14px;}
  .screen-notice{font-size:14px;}
  .screen-notice h3{font-size:16px;}
  .fb{font-size:13px;}

  /* 또렷한 키보드 포커스 링(어르신·키보드 사용자) */
  .btn:focus-visible,.opt:focus-visible,.text-input:focus-visible,.dunno-btn:focus-visible,
  .m-preview:focus-visible,.sug-btn:focus-visible,.stp-dot:focus-visible{
    outline:3px solid #2b7fff;outline-offset:2px;
  }
  .text-input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(43,127,255,.22);}

  /* 신청인 단계 실시간 나이/미성년 표시 */
  .age-status{font-size:15px;margin:-4px 0 14px;line-height:1.5;}
  .age-status:empty{margin:0;}
  .age-status.ok{color:#1b7a34;font-weight:600;}
  .age-status.bad{color:#c0392b;font-weight:600;}
  .age-status.minor{background:#fff8e1;border:1px solid #ffdf8a;color:#6b4e00;
    border-radius:10px;padding:11px 13px;}

  /* ===== 법정대리인 동의서(2쪽) — 미성년자 대리 신청 시에만 표시/인쇄 ===== */
  .consent-page{display:none;}
  body.needs-consent .consent-page{display:block;}
  .proxy-page{display:none;}
  body.needs-proxy .proxy-page{display:block;}
  .modal-scroll .consent-page,.modal-scroll .proxy-page{margin-top:14px;}
  /* 본 창(좌측 서식 열)에서 신청서↔첨부서류(동의서/위임장) 사이 페이지 구분 가로선 */
  .form-col .consent-page,.form-col .proxy-page{position:relative;margin-top:36px;}
  .form-col .consent-page::before,.form-col .proxy-page::before{
    content:"";position:absolute;left:0;right:0;top:-19px;border-top:2px dashed #a9b2bd;}
  /* 위임장 전용: 섹션 헤더 + 행 라벨 셀 */
  .psec{font-weight:700;font-size:11pt;margin:7mm 0 2mm;}
  .psub{font-size:8.5pt;font-weight:400;color:#555;}

/* 주민등록번호 → 만나이·미성년·유효성. 순수 함수, 저장 안 함.
   ※ 체크섬(검증번호)은 2020.10 이후 발급분에서 폐지 → 검증에 쓰면 정상 번호를 오탈락시키므로 쓰지 않음.
      대신 '생년월일 형식 + 세기/성별 코드'로 명백한 오입력만 잡는다. */
function deriveState(d){
  var out={ ageKnown:false, ageYears:null, isMinor:false };
  var j=String((d&&d.jumin)||"").replace(/\D/g,"");
  if(j.length<7) return out;                       // 생년월일+세기/성별 자리까지 있어야 판정
  var yy=+j.slice(0,2), mm=+j.slice(2,4), dd=+j.slice(4,6), code=+j.charAt(6);
  var century;
  if(code===1||code===2||code===5||code===6) century=1900;       // 1900년대(내국인/외국인)
  else if(code===3||code===4||code===7||code===8) century=2000;  // 2000년대
  else if(code===9||code===0) century=1800;                      // 1800년대
  else return out;                                 // 유효하지 않은 세기/성별 코드
  if(mm<1||mm>12||dd<1||dd>31) return out;         // 생년월일 형식 오류
  var t=APP_TODAY||new Date();                     // 런타임 기준(연도 하드코딩 금지)
  var age=t.getFullYear()-(century+yy) - ((t.getMonth()+1<mm)||(t.getMonth()+1===mm&&t.getDate()<dd)?1:0);
  if(age<0||age>130) return out;                   // 비현실적 → 미상 처리(차단·필터 안 함)
  out.ageKnown=true; out.ageYears=age; out.isMinor=(age<18);
  return out;
}
/* 나이 규칙: 미성년은 10년 여권 불가 → 유효기간을 5년으로 '강제 선택'(제거 대신). 안내는 note가 담당 */
function applyAgeRules(){
  var s=deriveState(state.data);
  if(s.ageKnown && s.isMinor && state.data.period==="10년") state.data.period="5년";
  if(state.data.kind==="긴급") state.data.period="단수(1년)";   // 긴급여권은 1년 단수만 가능
}
/* 예상 수수료(원) — 2026-03-01 인상 기준(passport.go.kr 수수료 안내). 정확한 금액은 창구 확인.
   불명확(관용·외교관·여행증명서·잔여기간·5년미만)은 null → '창구 안내' */
function estimateFee(d){
  var k=d.kind, pg=(d.pages==="26면")?"26":"58", p=d.period, s=deriveState(d);
  if(k==="관용"||k==="외교관"||k==="여행증명서") return null;
  if(k==="긴급") return { won:50000, note:"긴급여권(단수·1년)" };
  if(p==="단수(1년)") return { won:17000, note:"단수여권(1년)" };
  if(p==="잔여기간"||p==="5년 미만"||!p) return null;
  var t;
  if(p==="10년") t={ "58":52000, "26":49000 };
  else if(p==="5년") t=(s.ageKnown&&s.ageYears<8) ? { "58":35000, "26":32000 } : { "58":44000, "26":41000 };
  else return null;
  return { won:t[pg], note:p+" "+(d.pages||"58면") };
}
function wonFmt(n){ return String(n).replace(/\B(?=(\d{3})+(?!\d))/g,","); }
/* 첨부 서류 판정 (상호 배타적):
   · 미성년자(주민번호로 판정)면 본인/대리 관계없이 → 「법정대리인 동의서」(별지 제1호의3서식)
   · 성인을 대리인이 신청하면 → 「위임장」(여권 위임장)
   미성년 대리는 그 대리인이 곧 법정대리인이므로 동의서 경로로 처리(위임장 아님). */
function needsConsent(d){ var s=deriveState(d); return s.ageKnown && s.isMinor; }
function needsProxy(d){ return d.applyBy==="대리인" && !needsConsent(d); }
/* 주민등록번호 → 생년월일 문자열(YYYY.MM.DD). 위임장 생년월일 자동기입용 */
function birthFromJumin(v){
  var j=String(v||"").replace(/\D/g,""); if(j.length<7) return "";
  var yy=+j.slice(0,2), mm=+j.slice(2,4), dd=+j.slice(4,6), code=+j.charAt(6), c;
  if(code===1||code===2||code===5||code===6) c=1900;
  else if(code===3||code===4||code===7||code===8) c=2000;
  else if(code===9||code===0) c=1800; else return "";
  if(mm<1||mm>12||dd<1||dd>31) return "";
  return (c+yy)+"."+String(mm).padStart(2,"0")+"."+String(dd).padStart(2,"0");
}

function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,function(c){
  return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]; }); }
function escBr(s){ return esc(s).replace(/\n/g,"<br>"); }
function reqTag(req){ return req ? ' <span class="fb fb-req">필수</span>' : ' <span class="fb fb-opt">선택</span>'; }

function formatDate(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0"), day=String(d.getDate()).padStart(2,"0");
  return y+"년 "+m+"월 "+day+"일";
}
// 주민등록번호: 숫자 13자리 → 앞6-뒤7
function formatJumin(v){
  const d=String(v||"").replace(/\D/g,"").slice(0,13);
  return d.length<=6 ? d : d.slice(0,6)+"-"+d.slice(6);
}
// 전화번호: 숫자만 → 하이픈 자동 (010 등 3자리국번 · 02 서울)
function formatPhone(v){
  let d=String(v||"").replace(/\D/g,"").slice(0,11);
  if(d.startsWith("02")){
    if(d.length<=2) return d;
    if(d.length<=5) return d.slice(0,2)+"-"+d.slice(2);
    if(d.length<=9) return d.slice(0,2)+"-"+d.slice(2,d.length-4)+"-"+d.slice(d.length-4);
    return d.slice(0,2)+"-"+d.slice(2,6)+"-"+d.slice(6,10);
  }
  if(d.length<=3) return d;
  if(d.length<=7) return d.slice(0,3)+"-"+d.slice(3);
  if(d.length<=10) return d.slice(0,3)+"-"+d.slice(3,6)+"-"+d.slice(6);
  return d.slice(0,3)+"-"+d.slice(3,7)+"-"+d.slice(7);
}

  "윤":"YOON","장":"JANG","임":"LIM","한":"HAN","오":"OH","서":"SEO","신":"SHIN","권":"KWON","황":"HWANG",
  "안":"AHN","송":"SONG","전":"JEON","홍":"HONG","유":"YOO","류":"RYU","고":"KO","문":"MOON","양":"YANG",
  "손":"SON","배":"BAE","백":"BAEK","허":"HEO","남":"NAM","심":"SIM","노":"NOH","하":"HA","곽":"KWAK",
  "성":"SUNG","차":"CHA","주":"JOO","우":"WOO","구":"KOO","민":"MIN","지":"JI","엄":"EOM"};
const CHO=["g","kk","n","d","tt","r","m","b","pp","s","ss","","j","jj","ch","k","t","p","h"];
const JUNG=["a","ae","ya","yae","eo","e","yeo","ye","o","wa","wae","oe","yo","u","wo","we","wi","yu","eu","ui","i"];
const JONG=["","k","k","k","n","n","n","t","l","k","m","p","t","t","p","l","m","p","p","t","t","ng","t","t","k","t","p","t"];
function romanizeSyllable(ch){
  const c=ch.charCodeAt(0)-0xAC00;
  if(c<0||c>11171) return "";
  return CHO[Math.floor(c/588)]+JUNG[Math.floor((c%588)/28)]+JONG[c%28];
}
function suggestSurname(nm){ const f=(nm||"").trim().charAt(0); if(!f) return ""; return (SURNAME_ROMAN[f]||romanizeSyllable(f)).toUpperCase(); }
function suggestGiven(nm){ let o=""; for(const ch of (nm||"").trim().slice(1)) o+=romanizeSyllable(ch); return o.toUpperCase(); }

function applyMask(mask, val){
  if(mask==="jumin") return formatJumin(val);
  if(mask==="phone") return formatPhone(val);
  return val;
}

// 이 단계에서 다루는 필드(좌측 하이라이트용)
function getStepFieldSet(step){
  const def=STEP_DEFS[step-1], set=new Set();
  (def.groups||[]).forEach(function(g){ set.add(g.field); });
  (def.inputs||[]).forEach(function(i){ set.add(i.field); });
  (def.condInputs||[]).forEach(function(i){ set.add(i.field); });
  if(def.addrInput) set.add(def.addrInput.field);
  (def.extras||[]).forEach(function(x){ set.add(x.group?x.group.field:x.field); });
  return set;
}
// 이 단계의 필수 필드(조건 충족 항목만)
function stepRequired(def){
  const r=[];
  (def.groups||[]).forEach(function(g){ if(g.req && (!g.cond||g.cond(state.data))) r.push(g.field); });
  (def.inputs||[]).forEach(function(i){ if(i.req && (!i.cond||i.cond(state.data))) r.push(i.field); });
  (def.condInputs||[]).forEach(function(i){ if(i.req && (!i.cond||i.cond(state.data))) r.push(i.field); });
  if(def.addrInput && def.addrInput.req && (!def.addrInput.cond||def.addrInput.cond(state.data))) r.push(def.addrInput.field);
  return r;
}

  // 서명란 자동기입: 신청인 성명 + 작성일(오늘) 년/월/일 — 서약란·동의서 2곳 동일

  const signer=String((d.applyBy==="대리인" && d.agentName ? d.agentName : d.nameKor)||"").trim();
  if(signer) CO.sign.name.forEach(function(p){
    h+='<span class="ov" style="left:'+X(p[0])+'%;top:'+Y(p[1])+'%;font-size:2cqw;">'+esc(signer)+'</span>'; });

  renderProxy();
}

/* =========================================================
   8) 로마자 권장 예시 (참고용 · 자동 확정 안 함)
   ========================================================= */
function buildRomanSuggestion(){
  let h="";
  if(state.data.hasPassport==="있음"){
    h+='<div class="warn-strong">⚠ 기존 여권이 있으시면, 새 신청서의 로마자 성명을 <b>기존 여권과 똑같이</b> 적어야 합니다. '+
       '철자가 한 글자라도 다르면 접수가 거절될 수 있어요. 아래 예시와 다를 수 있으니 <b>반드시 기존 여권을 보고</b> 입력하세요.</div>';
  } else if(state.data.hasPassport==="모름"){
    h+='<div class="note-box">기존 여권이 있는지 확실하지 않다면 먼저 확인해 주세요. 있으면 그 여권의 로마자 성명을 그대로 사용해야 합니다.</div>';
  }
  const nm=(state.data.nameKor||"").trim();
  if(!nm){ h+='<div class="note-box">앞의 <b>‘신청인 정보’ 단계</b>에서 <b>한글 성명</b>을 입력하시면 권장 로마자 예시를 제안해 드립니다.</div>'; return h; }
  const sur=suggestSurname(nm), given=suggestGiven(nm);
  h+='<div class="sug-box"><div class="sug-title">‘'+esc(nm)+'’ 님 기준 권장 로마자 예시 (참고용)</div>';
  if(sur) h+='<div class="sug-row"><span>성 '+esc(nm.charAt(0))+' →</span> <b>'+esc(sur)+'</b>'+
    '<button type="button" class="sug-btn" data-act="suggest" data-field="romanSur" data-val="'+esc(sur)+'">이 예시 적용</button></div>';
  if(nm.length>1&&given) h+='<div class="sug-row"><span>이름 '+esc(nm.slice(1))+' →</span> <b>'+esc(given)+'</b>'+
    '<button type="button" class="sug-btn" data-act="suggest" data-field="romanGiven" data-val="'+esc(given)+'">이 예시 적용</button></div>';
  h+='<div class="sug-note">권장 예시는 <b>참고용</b>이며 자동으로 확정되지 않습니다. [이 예시 적용] 후 직접 확인·수정하세요.</div></div>';
  return h;
}

var SIDO=["서울특별시","부산광역시","대구광역시","인천광역시","광주광역시","대전광역시","울산광역시","세종특별자치시","경기도","강원특별자치도","충청북도","충청남도","전라북도","전라남도","경상북도","경상남도","제주특별자치도"];
function composeAddr(a){
  a=a||{};
  var head=[a.sido,a.sigungu,a.road,a.bldg].filter(function(s){return s&&String(s).trim();}).join(" ");
  var det=(a.detail||"").trim();
  return det ? (head?head+" "+det:det) : head;
}
function addrText(part,ph,val){
  return '<input class="text-input" type="text" data-act="addr" data-part="'+part+'" value="'+esc(val||"")+'" placeholder="'+esc(ph)+'" autocomplete="off" style="margin-bottom:8px;">';
}
function renderAddrInput(cfg){

  h+='<select class="text-input" data-act="addr" data-part="sido" style="margin-bottom:8px;"><option value="">시/도 선택</option>'+
     SIDO.map(function(v){ return '<option value="'+esc(v)+'"'+(a.sido===v?" selected":"")+">"+esc(v)+"</option>"; }).join("")+"</select>";

function renderInput(inp){

    esc(inp.label)+reqTag(inp.req)+"</label>"+

function renderGroup(g){
  if(g.cond && !g.cond(state.data)) return "";
  const cur=state.data[g.field];
  let h='<div class="field"><div class="field-label">'+esc(g.label)+reqTag(g.req)+"</div>";
  if(g.help) h+='<div class="q-help">'+esc(g.help)+"</div>";
  h+='<div class="opts">';
  g.options.forEach(function(raw){
    const o=(typeof raw==="string")?{v:raw}:raw;
    const on=cur===o.v?" selected":"";
    h+='<button type="button" class="opt'+on+'" data-act="opt" data-field="'+esc(g.field)+'" data-val="'+esc(o.v)+'">'+
      '<span class="opt-main"><span class="opt-check" aria-hidden="true">✓</span>'+
      '<span class="opt-label">'+esc(o.label||o.v)+"</span>"+
      (o.rec?'<span class="opt-rec">많이 선택</span>':"")+"</span>"+
      (o.desc?'<span class="opt-desc">'+esc(o.desc)+"</span>":"")+"</button>";
  });
  return h+"</div></div>";
}
// 8단계 스텝퍼: 완료(✓)·현재(강조)·예정, 지나온 단계는 눌러 되돌아가기
function renderStepper(){
  const cur=state.step;
  let h="";
  for(let n=1;n<=TOTAL_STEPS;n++){
    const cls = n<cur ? "done nav" : (n===cur ? "cur" : "");
    const inner = n<cur ? "✓" : String(n);
    const nav = n<cur ? ' data-act="goto" data-step="'+n+'" tabindex="0" role="button" aria-label="'+esc(STEP_SHORT[n-1]||("" +n))+' 단계로 돌아가기"' : "";
    h+='<div class="stp '+cls+'">'+
       '<span class="stp-dot"'+nav+'>'+inner+"</span>"+
       '<span class="stp-lab">'+esc(STEP_SHORT[n-1]||"")+"</span></div>";
  }
  el.stepper.innerHTML=h;
  const def=STEP_DEFS[cur-1];
  el.stepper.setAttribute("aria-valuemax",TOTAL_STEPS);
  el.stepper.setAttribute("aria-valuenow",cur);
  el.stepper.setAttribute("aria-valuetext",(def.section?def.section+" · ":"")+cur+" / "+TOTAL_STEPS+" 단계");
}
function renderStep(){
  const def=STEP_DEFS[state.step-1];
  let h="";

  if(def.summary){ h=renderSummary(def); }
  else {
    if(def.question) h+='<div class="coach-q">'+esc(def.question)+"</div>";
    if(def.why) h+='<div class="why-box"><span class="ic">💡</span>'+escBr(def.why)+"</div>";
    if(def.terms&&def.terms.length){
      h+='<details class="terms"><summary>쉬운 말 풀이 (모르는 용어가 있나요?)</summary>';
      def.terms.forEach(function(t){ h+='<div class="term"><b>'+esc(t.term)+"</b> — "+esc(t.desc)+"</div>"; });
      h+="</details>";
    }
    if(def.checklist){
      h+='<div class="info-box"><b>체크사항</b><ul style="margin:8px 0 0;padding-left:20px;">'+
        def.checklist.map(function(c){ return "<li>"+esc(c)+"</li>"; }).join("")+"</ul></div>";
    }
    if(def.warn && def.warn.when(state.data))
      h+='<div class="warn-strong">⚠ '+escBr(def.warn.msg)+"</div>";
    if(state.unsure[state.step])
      h+='<div class="unsure-note">이 단계는 ‘잘 모르겠어요’로 표시하셨어요. 비워 둔 항목은 <b>‘직원에게 여쭤볼 항목’</b>에 정리되어 창구에서 함께 확인해 드립니다.</div>';

    if(def.suggestRoman) h+=buildRomanSuggestion();
    (def.inputs||[]).forEach(function(inp){ h+=renderInput(inp); });
    if(def.section==="신청인") h+='<div class="age-status" id="ageStatus" aria-live="polite"></div>';  // 주민번호 기반 실시간 나이/미성년 표시
    (def.groups||[]).forEach(function(g){ h+=renderGroup(g); });        // inputs → groups → condInputs 순
    (def.condInputs||[]).forEach(function(inp){ if(!inp.cond||inp.cond(state.data)) h+=renderInput(inp); }); // 조건부 입력은 그룹 선택 뒤(예: 대리인 선택 후 성명)
    if(def.note && def.note.when(state.data)){
      var _nm=(typeof def.note.msg==="function")?def.note.msg(state.data):def.note.msg;
      h+='<div class="note-box">'+escBr(_nm)+"</div>";
    }
    if(def.addrInput && (!def.addrInput.cond||def.addrInput.cond(state.data)))
      h+=renderAddrInput(def.addrInput);
    if(def.extras && def.extras.length){
      h+='<details class="terms"><summary>그 외 추가 기재 (대부분 생략 — 담당자 요청 시 펼치기)</summary>';
      def.extras.forEach(function(x){ h += x.group ? renderGroup(x.group) : renderInput(x); });
      h+="</details>";
    }

    if(getStepFieldSet(state.step).size>0)
      h+='<button type="button" class="dunno-btn" data-act="dunno">🤔 잘 모르겠어요 — 직원에게 여쭤볼게요</button>';
  }

  el.wizBody.innerHTML=h;
  el.wizTitle.textContent=state.step+"단계 · "+def.title;
  el.wizCount.textContent=(def.section?def.section+" · ":"")+"진행 "+state.step+" / "+TOTAL_STEPS;
  renderStepper();
  updateNav();
  updateWarning();
  updateAgeStatus();
}

// 확인·완료 단계
function renderSummary(){
  // '잘 모르겠어요'로 표시한 단계에 속한 필드 집합 → 요약에서 표시로 연결
  const unsureFields=new Set();
  Object.keys(state.unsure).forEach(function(s){
    if(state.unsure[s]) getStepFieldSet(parseInt(s,10)).forEach(function(f){ unsureFields.add(f); });
  });
  const blanks=[];
  let rows="";
  SUMMARY_ROWS.forEach(function(r){
    const field=r[0], label=r[1], cond=r[2], fmt=r[3];
    if(cond && !cond(state.data)) return;             // 조건 미충족 항목은 요약에서 제외
    const raw=state.data[field];
    const flagged=unsureFields.has(field) && !raw;   // 값이 없는 항목만 '🤔 표시함'
    const shown=raw ? esc(fmt?fmt(raw):raw) : '<span class="v empty">미입력</span>';
    if(!raw) blanks.push(flagged ? label+" 🤔" : label);
    rows+='<div class="sum-row"><span class="k">'+esc(label)+(flagged?' <span class="fb fb-req">🤔 표시함</span>':"")+'</span><span class="v">'+(raw?shown:'<span class="empty">미입력</span>')+'</span></div>';
  });

  let h='<div class="coach-q">입력하신 내용을 확인해 주세요</div>';
  h+='<div class="why-box"><span class="ic">💡</span>아래 내용이 그대로 신청서에 채워집니다. 서명·날인은 인쇄 후 손으로 하시면 됩니다.</div>';
  h+='<div class="sum-list">'+rows+'</div>';

  if(blanks.length>0){
    h+='<div class="staff-list"><div class="st">창구 직원에게 여쭤볼 항목 ('+blanks.length+'건)</div>'+
       '아래 항목이 비어 있어요. <b>🤔</b> 표시는 ‘잘 모르겠어요’로 넘어온 단계입니다. 창구에서 함께 확인해 드립니다.'+
       '<ul>'+blanks.map(function(b){ return "<li>"+esc(b)+"</li>"; }).join("")+"</ul></div>";
  } else {
    h+='<div class="staff-list ok">✓ 모든 항목이 입력되었습니다. 창구에서 최종 확인만 받으시면 됩니다.</div>';
  }

  var fee=estimateFee(state.data);
  h+='<div class="info-box"><b>참고 · 예상 수수료·처리기간</b>'+
     '<div style="margin-top:6px;font-size:16px;">'+
     (fee ? '예상 수수료 <b>약 '+wonFmt(fee.won)+'원</b> <span style="color:var(--muted)">('+esc(fee.note)+')</span>'
          : '수수료는 창구에서 안내받으세요')+
     ' · 처리 약 <b>7~10일</b></div>'+
     '<div class="hint" style="margin-top:6px;">2026-03 기준(외교부 고시) · 정확한 금액·기한은 창구에서 확인하세요.</div></div>';
  h+='<div class="note-box">서명란(신청인 성명 옆)과 동의서 서명은 <b>인쇄한 뒤 검은색 펜으로 직접 서명 또는 날인</b>하세요. 사진(3.5×4.5cm)은 창구에서 부착합니다.</div>';
  if(needsConsent(state.data))
    h+='<div class="info-box">👨‍👩‍👧 미성년자 여권 신청이라, 인쇄하면 <b>「법정대리인 동의서」가 2쪽으로 함께 출력</b>됩니다. 신청인·법정대리인 성명·주소·작성일은 자동으로 채워지고, <b>서명란과 법정대리인 2(공동친권자)</b> 칸만 창구에서 손으로 적으세요.</div>';
  else if(needsProxy(state.data))
    h+='<div class="info-box">🧾 대리 신청이라, 인쇄하면 <b>「위임장」이 2쪽으로 함께 출력</b>됩니다. 입력하신 수임인(대리인)·위임인(신청인) 정보와 작성일이 자동으로 채워집니다. 수임인 생년월일·주소·전화번호는 <b>비워 두면 인쇄 후 손으로 적어도 됩니다.</b> 서명은 인쇄한 뒤 직접 하세요. (위임인 신분증 사본·관계 증빙 필요)</div>';
  h+='<button type="button" class="btn primary" style="width:100%;padding:16px;font-size:18px;" data-act="print">🖨️ 신청서 인쇄 / PDF로 저장</button>';
  return h;
}

function updateNav(){
  el.btnPrev.disabled=(state.step===1);
  el.btnNext.disabled=(state.step===TOTAL_STEPS);
}
function updateWarning(){
  const def=STEP_DEFS[state.step-1];
  if(def.validate){ var m=def.validate(state.data); if(m!==true && m){ el.stepWarn.textContent=m; return; } }  // 입력 오류 실시간 표시
  const missing=stepRequired(def).filter(function(f){ return !state.data[f]; });
  el.stepWarn.textContent = missing.length===0 ? "" :
    "아직 입력하지 않은 필수 항목이 있어요 (계속 진행할 수는 있습니다).";
}
/* 신청인 단계: 주민등록번호로 판정한 나이·미성년 여부를 실시간 표시(입력칸 재렌더 없이 이 요소만 갱신) */
function updateAgeStatus(){
  var elA=document.getElementById("ageStatus"); if(!elA) return;
  var j=String(state.data.jumin||"").replace(/\D/g,"");
  if(j.length<7){ elA.className="age-status"; elA.innerHTML=""; return; }   // 아직 세기/성별 자리 전
  var s=deriveState(state.data);
  if(!s.ageKnown){ elA.className="age-status bad"; elA.innerHTML="⚠ 나이를 인식하지 못했습니다 — 생년월일·번호를 다시 확인해 주세요."; return; }
  if(s.isMinor) elA.className="age-status minor", elA.innerHTML="👶 만 <b>"+s.ageYears+"세</b> · <b>미성년자</b>로 확인 — 유효기간 5년이 자동 적용되고, 인쇄 시 「법정대리인 동의서」가 함께 출력됩니다.";
  else elA.className="age-status ok", elA.innerHTML="✓ 만 <b>"+s.ageYears+"세</b> (성인)";
}

/* =========================================================
   10) 전체 렌더 & 이벤트
   ========================================================= */
function renderAll(){ applyAgeRules(); renderStep(); renderForm(); }

function bindWizardEvents(){
  function onAddr(e){
    var t=e.target.closest('[data-act="addr"]'); if(!t) return;
    if(!state.addr) state.addr={};
    state.addr[t.getAttribute("data-part")]=t.value;
    state.data.mailAddr=composeAddr(state.addr);
    var pv=document.getElementById("addrPrev");
    if(pv) pv.innerHTML='입력하시면 서식에 이렇게 들어갑니다 → <b>'+(esc(composeAddr(state.addr))||"(아직 없음)")+'</b>';
    renderForm(); updateWarning();
  }
  el.wizBody.addEventListener("change", onAddr);
  // Enter: 입력칸에서 다음 칸으로, 마지막 칸이면 다음 단계로 (키오스크·어르신 편의)
  el.wizBody.addEventListener("keydown", function(e){
    if(e.key!=="Enter" || e.isComposing) return;
    var fld=e.target.closest('[data-act="input"],[data-act="addr"]');
    if(!fld) return;
    e.preventDefault();
    var flds=Array.prototype.slice.call(el.wizBody.querySelectorAll('[data-act="input"],[data-act="addr"]'));
    var idx=flds.indexOf(fld);
    if(idx>-1 && idx<flds.length-1){ flds[idx+1].focus(); }
    else { el.btnNext.click(); }
  });
  el.wizBody.addEventListener("click", function(e){
    const dunno=e.target.closest('[data-act="dunno"]');
    if(dunno){ state.unsure[state.step]=true; if(state.step<TOTAL_STEPS) state.step++; renderAll(); scrollPanelTop(); return; }
    const pr=e.target.closest('[data-act="print"]');
    if(pr){ window.print(); return; }
    const sug=e.target.closest('[data-act="suggest"]');
    if(sug){ state.data[sug.getAttribute("data-field")]=sug.getAttribute("data-val"); renderAll(); return; }
    const opt=e.target.closest('[data-act="opt"]');
    if(opt){
      const f=opt.getAttribute("data-field"), val=opt.getAttribute("data-val");
      if(f==="period"){
        if(state.data.kind==="긴급"){ flagWarn("긴급여권은 유효기간 1년의 단수여권만 발급됩니다."); return; }   // 긴급은 단수 고정
        if(val==="10년"){ var ds=deriveState(state.data);
          if(ds.ageKnown && ds.isMinor){ flagWarn("만 18세 미만은 10년 여권을 선택할 수 없어 5년으로 안내됩니다."); return; } }   // 미성년 10년 차단
      }
      state.data[f]=val;
      // 종류 변경 정합성: 여행증명서 아니면 왕복/편도 해제 / 긴급이면 단수 강제 / 긴급에서 벗어나면 단수 복원
      if(f==="kind"){
        if(state.data.kind!=="여행증명서") state.data.travelType="";
        if(val==="긴급") state.data.period="단수(1년)";
        else if(state.data.period==="단수(1년)") state.data.period="10년";
      }
      if(f==="mailService" && state.data.mailService!=="희망") state.data.mailAddr="";
      renderAll();
      return;
    }
  });
  el.wizBody.addEventListener("input", function(e){
    if(e.target.closest('[data-act="addr"]')){ onAddr(e); return; }
    const input=e.target.closest('[data-act="input"]');
    if(!input) return;
    let v=input.value;
    const mask=input.getAttribute("data-mask");
    if(mask){ v=applyMask(mask,v); if(input.value!==v) input.value=v; }
    else if(input.getAttribute("data-upper")){ v=v.toUpperCase(); if(input.value!==v) input.value=v; }
    state.data[input.getAttribute("data-field")]=v;
    applyAgeRules();       // 주민번호 입력 즉시 나이 규칙 반영(미성년→5년 강제 등)
    renderForm();
    updateAgeStatus();     // 미성년/나이 실시간 표시
    updateWarning();
  });
}
function flagWarn(msg){ el.stepWarn.textContent=msg; }
function focusField(f){ var inp=document.getElementById("in_"+f); if(inp){ inp.focus(); inp.scrollIntoView({block:"center",behavior:"smooth"}); } }
function tryAdvance(){
  var def=STEP_DEFS[state.step-1];
  if(def.validate){ var m=def.validate(state.data); if(m!==true && m){ flagWarn(m); return false; } }
  var missing=stepRequired(def).filter(function(f){ return !state.data[f]; });
  if(missing.length && !state.unsure[state.step]){
    flagWarn("아직 비어 있는 필수 항목이 있어요. 채우시거나, ‘잘 모르겠어요’를 눌러 창구에서 확인받으세요.");
    focusField(missing[0]);
    return false;
  }
  return true;
}
function bindGlobalEvents(){
  el.btnPrev.addEventListener("click", function(){ if(state.step>1){ state.step--; renderAll(); scrollPanelTop(); } });
  el.btnNext.addEventListener("click", function(){ if(state.step<TOTAL_STEPS && tryAdvance()){ state.step++; renderAll(); scrollPanelTop(); } });
  document.getElementById("btnPrint").addEventListener("click", function(){ window.print(); });
  document.getElementById("btnReset").addEventListener("click", function(){
    if(confirm("입력한 모든 내용을 지우고 처음부터 다시 시작할까요?")){ state=createEmptyState(); renderAll(); scrollPanelTop(); }
  });
  document.getElementById("btnSampleAdult").addEventListener("click", function(){ fillSample("adult"); renderAll(); });
  document.getElementById("btnSampleMinor").addEventListener("click", function(){ fillSample("minor"); renderAll(); });
  document.getElementById("btnPreview").addEventListener("click", openPreview);
  var bpm=document.getElementById("btnPreviewMobile"); if(bpm) bpm.addEventListener("click", openPreview);
  document.getElementById("btnFlip").addEventListener("click", function(){
    document.body.classList.toggle("form-left");   // 좌우 반전(무저장, 새로고침 시 기본으로)
  });
  function gotoStep(d){
    var n=parseInt(d.getAttribute("data-step"),10);
    if(n>=1 && n<state.step){ state.step=n; renderAll(); scrollPanelTop(); }  // 되돌아가기만 허용(검증 우회 없음)
  }
  el.stepper.addEventListener("click", function(e){
    var d=e.target.closest('[data-act="goto"]'); if(d) gotoStep(d);
  });
  el.stepper.addEventListener("keydown", function(e){
    if(e.key!=="Enter" && e.key!==" ") return;
    var d=e.target.closest('[data-act="goto"]'); if(!d) return;
    e.preventDefault(); gotoStep(d);
  });
}
/* 테스트용 작성예시 — kind: "adult"(성인 본인) | "minor"(미성년자, 법정대리인 대리 → 동의서) */
function fillSample(kind){
  state.addr={};
  var base={
    kind:"일반", travelType:"", pages:"58면", period:"10년",
    nameKor:"", jumin:"", phone:"",
    emgName:"", emgRel:"", emgPhone:"",
    hasPassport:"없음", romanSur:"", romanGiven:"", regBase:"",
    spouseRoman:"", braille:"희망 안 함", mailService:"희망 안 함", mailAddr:"",
    applyBy:"본인", agentName:"", guardianName:"", guardianRel:"", guardianJumin:"", applicantAddr:"", guardianAddr:"",
    agentBirth:"", agentAddr:"", agentPhone:""
  };
  if(kind==="minor"){
    // 미성년자(2012년생) — 아버지(법정대리인)가 대리 신청 → 「법정대리인 동의서」 자동 출력
    state.data=Object.assign(base,{
      pages:"26면", period:"5년",
      nameKor:"김민준", jumin:"1203114234567", phone:"01023456789",
      emgName:"김철수", emgRel:"부", emgPhone:"01087654321",
      romanSur:"KIM", romanGiven:"MINJUN",
      applyBy:"대리인", agentName:"김철수", guardianRel:"부", guardianJumin:"7505051234567",
      applicantAddr:"경기도 군포시 산본로 123, 101동 202호"
    });
  } else {
    // 성인 본인 신청
    state.data=Object.assign(base,{
      pages:"58면", period:"10년",
      nameKor:"홍길동", jumin:"9001011234567", phone:"01012345678",
      emgName:"홍판서", emgRel:"부", emgPhone:"01098765432",
      romanSur:"HONG", romanGiven:"GILDONG",
      applyBy:"본인"
    });
  }
}
function scrollPanelTop(){
  if(window.matchMedia("(max-width:940px)").matches){
    const p=document.querySelector(".panel-col");
    if(p) p.scrollIntoView({behavior:"smooth",block:"start"});
  } else {
    el.wizBody.scrollTop=0;
  }
}

/* =========================================================
   11) 초기화
   ========================================================= */
function init(){
  APP_TODAY=new Date();
  document.querySelectorAll(".bg").forEach(function(img){ img.src=FORM_IMG; });
  document.getElementById("orgName").textContent=ORG_CONFIG.orgName;
  document.getElementById("today").textContent=formatDate(APP_TODAY);
  bindWizardEvents();
  bindGlobalEvents();
  renderAll();
}
init();
</script>
