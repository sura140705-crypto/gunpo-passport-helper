<title>민원실 신청서 작성 도우미 (시제품 v2)</title>
<!--
================================================================
  민원실 신청서 작성 도우미 - 시제품 v2 (Claude Code 인계용)
================================================================
  설계 원칙
  1. 단일 HTML 파일, 외부 의존성 없음 (서버/CDN 불필요)
  2. 데이터 저장 없음 (메모리 전용), 휘발성 보안
  3. 어르신 친화: 기본 폰트 18px, 큰 버튼, 고대비, 글자크기 조절
  4. 양식 위 작성: SVG 배경 + 절대좌표 input (실제 양식 미러)
  5. 우측 가이드: 포커스 필드에 맞춰 실시간 전환
  6. 검토 단계: 누락/형식 검증 후 PDF 저장 또는 인쇄 분기
  7. 확장 구조: SCHEMAS 객체에 신청서 정의를 선언적으로 기술

  Claude Code 리팩토링 시 권장 분리
  - /schemas/passport.js, /schemas/family.js ...  (각 신청서 스키마)
  - /lib/romanize.js                              (한글→로마자)
  - /lib/juso.js                                  (도로명주소 API)
  - /lib/validate.js                              (검증)
  - /lib/render.js                                (양식 렌더)
  - /assets/passport.svg                          (실제 양식 SVG)
================================================================
-->
<style>
:root {

  --ok: #2e7d32;

}
* { box-sizing: border-box; }
html, body {
  margin: 0; padding: 0;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

}
button { font-family: inherit; }

/* 헤더 */
header {
  background: var(--primary);
  color: white;
  padding: 14px 24px;

  justify-content: space-between;
  align-items: center;

}
header h1 {
  font-size: 22px;

  font-weight: 700;

}
header .crumb {

}
.controls { display: flex; gap: 10px; align-items: center; }
.controls .label { font-size: 15px; opacity: 0.9; }
.ctl-btn {

}
.ctl-btn:hover { background: rgba(255,255,255,0.2); }

/* 공통 버튼 */
.btn {
  font-size: 18px;
  padding: 12px 22px;
  border: 2px solid var(--primary);

/* 시작 화면 */

/* 메인 작성 화면 */

/* 라디오/체크 영역 */

@media print {

@media (max-width: 1100px) {
  .main { grid-template-columns: 1fr; }
  .guide { position: relative; top: 0; max-height: none; }
}
</style>

<script>
'use strict';

// ============================================================
// 0. 글로벌 상태
// ============================================================
const state = {
  view: 'intro',          // intro | form | review | finish
  schemaId: null,
  data: {},               // 입력값
  errors: {},             // 검증 결과
  activeField: null,
  zoom: 1.0,
  romanTouched: {},       // 사용자가 직접 수정한 로마자 필드
  idleTimer: null
};

// ============================================================
// 1. 한글 → 로마자 변환 (외교부 관용 표기 + 국립국어원 알고리즘)
// ============================================================
const SURNAME_MAP = {
  '김':'KIM','이':'LEE','박':'PARK','최':'CHOI','정':'JEONG',
  '강':'KANG','조':'CHO','윤':'YOON','장':'JANG','임':'LIM',
  '한':'HAN','오':'OH','서':'SEO','신':'SHIN','권':'KWON',
  '황':'HWANG','안':'AHN','송':'SONG','류':'RYU','전':'JEON',
  '홍':'HONG','고':'KO','문':'MOON','양':'YANG','손':'SON',
  '배':'BAE','백':'BAEK','허':'HEO','유':'YOO','남':'NAM',
  '심':'SIM','노':'NOH','하':'HA','곽':'KWAK','성':'SUNG',
  '차':'CHA','주':'JU','우':'WOO','구':'KOO','민':'MIN',
  '나':'NA','진':'JIN','지':'JI','엄':'UM','채':'CHAE',
  '원':'WON','천':'CHEON','방':'BANG','공':'KONG','현':'HYUN',
  '함':'HAM','변':'BYUN','염':'YEOM','여':'YEO','추':'CHU',
  '도':'DO','소':'SO','석':'SEOK','선':'SUN','설':'SEOL',
  '마':'MA','길':'KIL'
};

// 국립국어원 로마자 표기법 (간략)
const CHO = ['g','kk','n','d','tt','r','m','b','pp','s','ss','','j','jj','ch','k','t','p','h'];
const JUNG = ['a','ae','ya','yae','eo','e','yeo','ye','o','wa','wae','oe','yo','u','wo','we','wi','yu','eu','ui','i'];
const JONG = ['','k','k','kt','n','nt','nh','t','l','lk','lm','lp','lt','lt','lp','lh','m','p','ps','t','t','ng','t','t','k','t','p','t'];

function romanizeName(kor) {
  if (!kor) return '';
  kor = kor.replace(/\s+/g, '').trim();
  if (!kor) return '';
  let surname = '';
  let given = kor;
  if (SURNAME_MAP[kor[0]]) {
    surname = SURNAME_MAP[kor[0]];
    given = kor.slice(1);
  }
  let givenRoman = '';
  for (let i = 0; i < given.length; i++) {
    const code = given.charCodeAt(i) - 0xAC00;
    if (code < 0 || code > 11171) continue;
    const cho = Math.floor(code / 588);
    const jung = Math.floor((code % 588) / 28);
    const jong = code % 28;
    givenRoman += CHO[cho] + JUNG[jung] + JONG[jong];
  }
  givenRoman = givenRoman.toUpperCase();
  if (surname && givenRoman) return surname + ', ' + givenRoman;
  if (surname) return surname;
  return givenRoman;
}

// ============================================================
// 2. 도로명주소 검색 (데모 모드)
// ============================================================
// 운영 전환 시: USE_DEMO = false, JUSO_KEY 발급 후 적용
// API: https://business.juso.go.kr/addrlink/addrLinkApi.do (JSONP)
const USE_DEMO = true;
const JUSO_KEY = ''; // 운영 시 발급키 입력

const DEMO_ADDR = [
  { road:'세종특별자치시 한누리대로 2130', jibun:'세종특별자치시 보람동 245', zip:'30151' },
  { road:'서울특별시 중구 세종대로 110', jibun:'서울특별시 중구 태평로1가 31', zip:'04524' },
  { road:'서울특별시 종로구 사직로 161', jibun:'서울특별시 종로구 세종로 1', zip:'03045' },
  { road:'부산광역시 연제구 중앙대로 1001', jibun:'부산광역시 연제구 연산동 1000', zip:'47545' },
  { road:'대구광역시 중구 공평로 88', jibun:'대구광역시 중구 동인동1가 2', zip:'41911' },
  { road:'인천광역시 남동구 정각로 29', jibun:'인천광역시 남동구 구월동 1138', zip:'21554' },
  { road:'광주광역시 서구 내방로 111', jibun:'광주광역시 서구 치평동 1200', zip:'61945' },
  { road:'대전광역시 서구 둔산로 100', jibun:'대전광역시 서구 둔산동 1420', zip:'35242' },
  { road:'경기도 수원시 영통구 도청로 30', jibun:'경기도 수원시 영통구 이의동 1', zip:'16508' },
  { road:'강원특별자치도 춘천시 중앙로 1', jibun:'강원특별자치도 춘천시 봉의동 15', zip:'24266' }
];

function searchAddress(keyword, cb) {
  if (!keyword || keyword.length < 2) { cb([]); return; }
  if (USE_DEMO) {
    const r = DEMO_ADDR.filter(a =>
      a.road.includes(keyword) || a.jibun.includes(keyword)
    );
    setTimeout(() => cb(r), 150);
    return;
  }
  // 실제 API 호출 (운영용)
  // const url = `https://business.juso.go.kr/addrlink/addrLinkApi.do?confmKey=${JUSO_KEY}&currentPage=1&countPerPage=10&keyword=${encodeURIComponent(keyword)}&resultType=json`;
  // ... fetch / JSONP
}

// ============================================================
// 3. 신청서 스키마 정의
// ============================================================
// 좌표(x,y,w,h)는 800px 폭의 SVG 양식 기준
// 자세한 필드 메타: type, label, required, autofill, validate, guide
// ============================================================

const SCHEMAS = {
  passport: {
    title: '여권 발급 신청서',
    sub: '신규/재발급/유효기간 연장',
    bg: 'passportSVG',  // 함수명
    fields: [
      // 1. 종류 선택
      { id:'kind_new',  type:'check', group:'kind', label:'신규',  x:165, y:175, w:30, h:30,
        guide:{ title:'여권 종류 선택', body:'최초 발급이면 [신규]를 선택하세요.', warn:'기존 여권이 있으면 [재발급]을 선택해야 합니다.' } },

    else badge = '<span class="badge simple">약식</span>';
    return `
      <div class="menu-item ${disabled}" ${onclick}>
        ${badge}
        <h3>${s.title}</h3>
        <p>${s.sub || ''}</p>
      </div>
    `;
  }).join('');

  app.innerHTML = `
    ${renderHeader('')}
    <div class="intro">
      <h2>어떤 민원을 신청하시나요?</h2>
      <p class="sub">아래 신청서를 선택하시면 작성 도우미가 시작됩니다.<br>
      입력하신 내용은 화면에서만 사용되며 시청 시스템에 저장되지 않습니다.</p>
      <div class="menu-grid">${items}</div>
      <p class="sub" style="margin-top: 40px; font-size: 15px;">
        ※ 글자가 작게 보이시면 우측 상단 [가+] 버튼을 눌러 키우실 수 있습니다.
      </p>
    </div>
  `;
}

function selectSchema(id) {
  state.schemaId = id;
  state.data = {};
  state.errors = {};
  state.activeField = null;
  state.romanTouched = {};
  state.view = 'form';
  render();
  resetIdleTimer();
}

function renderForm() {
  const s = SCHEMAS[state.schemaId];
  const svg = window[s.bg]();
  const fieldsHTML = s.fields.map(f => renderField(f)).join('');
  const filled = countFilled();
  const total = countRequired();

  app.innerHTML = `
    ${renderHeader(s.title)}
    <div class="main">
      <div class="form-wrap">
        <div class="zoom-bar">
          <div class="title">${s.title}</div>
          <div class="zoom-ctl">
            <span style="font-size:15px; color:#666;">화면 크기</span>
            <button class="ctl-btn" onclick="changeZoom(-0.1)">축소</button>
            <span id="zoomVal" style="min-width:50px; text-align:center; font-weight:600;">${Math.round(state.zoom*100)}%</span>
            <button class="ctl-btn" onclick="changeZoom(0.1)">확대</button>
          </div>
        </div>
        <div class="form-canvas-outer">
          <div class="form-canvas" id="canvas" style="transform: scale(${state.zoom});">
            ${svg}
            ${fieldsHTML}
            <div id="addrPopup"></div>
          </div>
        </div>
        <div class="action-bar">
          <div class="progress">필수 항목 <strong>${filled} / ${total}</strong> 작성 완료</div>
          <div style="display:flex; gap:10px;">
            <button class="btn" onclick="goHome()">취소</button>
            <button class="btn primary large" onclick="openReview()">작성 완료 · 검토하기</button>
          </div>
        </div>
      </div>
      <aside class="guide" id="guide">
        ${renderGuide(null)}
      </aside>
    </div>
  `;
  // input 이벤트 바인딩
  s.fields.forEach(f => {
    const el = document.getElementById('f_' + f.id);
    if (!el) return;
    if (f.type === 'text' || f.type === 'addr') {
      el.addEventListener('focus', () => activateField(f.id));
      el.addEventListener('input', (e) => onInput(f, e.target));
      el.addEventListener('blur', () => { if (f.type==='addr') setTimeout(closeAddrPopup, 200); });
    } else if (f.type === 'check') {
      el.addEventListener('click', () => onCheck(f));
    }
  });
}

function renderField(f) {
  const v = state.data[f.id] || '';
  const filled = v ? 'filled' : '';
  const err = state.errors[f.id] ? 'error' : '';

  if (f.type === 'check') {
    const sel = state.data[f.group] === f.id ? 'selected' : '';
    return `<div class="check-area ${sel}" id="f_${f.id}"
      style="left:${f.x}px; top:${f.y}px; width:${f.w}px; height:${f.h}px;"
      title="${f.label}"></div>`;
  }
  const ro = f.readonly ? 'readonly' : '';
  const ph = f.placeholder ? `placeholder="${f.placeholder}"` : '';
  return `<input type="text" class="field ${filled} ${err}" id="f_${f.id}"
    style="left:${f.x}px; top:${f.y}px; width:${f.w}px; height:${f.h}px;"
    value="${escapeHtml(v)}" ${ro} ${ph} autocomplete="off" spellcheck="false"
    aria-label="${f.label}" />`;
}

function escapeHtml(s) {
  return String(s).replace(/[<>"'&]/g, c => ({'<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;','&':'&amp;'}[c]));
}

function onInput(f, el) {
  let v = el.value;
  if (f.format) {
    const newV = f.format(v);
    if (newV !== v) {
      el.value = newV;
      v = newV;
    }
  }
  state.data[f.id] = v;

  // 사용자가 직접 수정한 경우 표시 (자동완성 중단)
  if (f.id === 'nameRoman') state.romanTouched[f.id] = true;

  // 자동완성 트리거: 한글성명 → 로마자
  if (f.id === 'nameKor' && !state.romanTouched['nameRoman']) {
    state.data['nameRoman'] = romanizeName(v);
    const re = document.getElementById('f_nameRoman');
    if (re) { re.value = state.data['nameRoman']; re.classList.toggle('filled', !!state.data['nameRoman']); }
  }
  // 한글성명 → 서명란 복사
  if (f.id === 'nameKor') {
    state.data['sign'] = v;
    const se = document.getElementById('f_sign');
    if (se) { se.value = v; se.classList.toggle('filled', !!v); }
  }
  // 주소 검색
  if (f.id === 'addrRoad') {
    searchAddress(v, showAddrPopup);
  }
  el.classList.toggle('filled', !!v);
  el.classList.remove('error');
  delete state.errors[f.id];
  updateProgress();
  resetIdleTimer();
}

function onCheck(f) {
  state.data[f.group] = f.id;
  document.querySelectorAll(`[id^="f_${f.group}"]`).forEach(el => el.classList.remove('selected'));
  // 같은 그룹 모두 해제 후 본인만 선택
  const schema = SCHEMAS[state.schemaId];
  schema.fields.filter(x => x.group === f.group).forEach(x => {
    const el = document.getElementById('f_' + x.id);
    if (el) el.classList.toggle('selected', x.id === f.id);
  });
  activateField(f.id);
  updateProgress();
  resetIdleTimer();
}

function showAddrPopup(results) {
  const popup = document.getElementById('addrPopup');
  if (!popup) return;
  if (!results || results.length === 0) {
    popup.innerHTML = '';
    popup.style.display = 'none';
    return;
  }
  const field = SCHEMAS[state.schemaId].fields.find(f => f.id === 'addrRoad');
  popup.innerHTML = `<div class="addr-popup" style="left:${field.x}px; top:${field.y + field.h + 4}px;">
    ${results.map((r,i) => `
      <div class="addr-item" onclick="pickAddress(${i})">
        <div class="road">${r.road}</div>
        <div class="jibun">[지번] ${r.jibun} · 우편번호 ${r.zip}</div>
      </div>
    `).join('')}
  </div>`;
  popup.style.display = 'block';
  window._addrResults = results;
}

function pickAddress(i) {
  const r = window._addrResults[i];
  state.data.addrRoad = r.road;
  state.data.addrZip = r.zip;
  const e1 = document.getElementById('f_addrRoad');
  const e2 = document.getElementById('f_addrZip');
  if (e1) { e1.value = r.road; e1.classList.add('filled'); e1.classList.remove('error'); }
  if (e2) { e2.value = r.zip; e2.classList.add('filled'); }
  delete state.errors.addrRoad;
  closeAddrPopup();
  updateProgress();
  // 상세주소로 자동 이동
  const detail = document.getElementById('f_addrDetail');
  if (detail) detail.focus();
}

function closeAddrPopup() {
  const popup = document.getElementById('addrPopup');
  if (popup) { popup.innerHTML = ''; popup.style.display = 'none'; }
}

function activateField(fieldId) {
  state.activeField = fieldId;
  const f = SCHEMAS[state.schemaId].fields.find(x => x.id === fieldId);
  document.getElementById('guide').innerHTML = renderGuide(f);
}

function renderGuide(f) {
  if (!f) {
    return `
      <div class="guide-head">
        <div class="step">작성 안내</div>
        <h2>작성 도우미</h2>
      </div>
      <div class="guide-section">
        <p>양식의 입력칸을 클릭하시면 항목별 작성 방법이 이곳에 자세히 안내됩니다.</p>
        <div class="note info">
          <strong>작성 순서</strong><br>
          위에서부터 차례대로 입력하시면 됩니다. 한글 성명을 먼저 입력하시면 로마자가 자동으로 제안됩니다.
        </div>
        <div class="note warn">
          <strong>안내</strong><br>
          입력하신 내용은 화면에서만 사용되며 시청 시스템에 저장되지 않습니다. 3분간 입력이 없으면 자동으로 초기화됩니다.
        </div>
        <div class="note ok">
          <strong>도움이 필요하시면</strong><br>
          창구 직원이 옆에서 도와드립니다. 언제든 손을 들어 호출해주세요.
        </div>
      </div>
    `;
  }
  const g = f.guide || {};
  return `
    <div class="guide-head">
      <div class="step">현재 작성 항목</div>
      <h2>${g.title || f.label}</h2>
    </div>
    <div class="guide-section">
      ${g.body ? `<p>${g.body}</p>` : ''}
      ${g.example ? `<h3>작성 예시</h3><div class="example-box">${g.example.replace(/\n/g,'<br>')}</div>` : ''}
      ${g.warn ? `<div class="note warn"><strong>주의사항</strong><br>${g.warn}</div>` : ''}
      ${f.required ? `<div class="note info"><strong>필수 입력 항목입니다</strong></div>` : ''}
    </div>
  `;
}

function updateProgress() {
  const bar = document.querySelector('.progress');
  if (bar) {
    bar.innerHTML = `필수 항목 <strong>${countFilled()} / ${countRequired()}</strong> 작성 완료`;
  }
}

function countFilled() {
  const s = SCHEMAS[state.schemaId];
  return s.fields.filter(f => f.required && state.data[f.id]).length
       + countGroupFilled();
}

function countGroupFilled() {
  // 그룹(라디오)은 데이터가 set 되어 있으면 1로 카운트
  const groups = new Set();
  SCHEMAS[state.schemaId].fields.forEach(f => { if (f.group) groups.add(f.group); });
  let n = 0;
  groups.forEach(g => { if (state.data[g]) n++; });
  return n;
}

function countRequired() {
  const s = SCHEMAS[state.schemaId];
  const groups = new Set();
  s.fields.forEach(f => { if (f.group) groups.add(f.group); });
  return s.fields.filter(f => f.required).length + groups.size;
}

// ============================================================
// 6. 검토 단계
// ============================================================
function openReview() {
  const s = SCHEMAS[state.schemaId];
  const results = [];

  // 그룹 검증
  const groups = new Set();
  s.fields.forEach(f => { if (f.group) groups.add(f.group); });
  groups.forEach(g => {
    if (!state.data[g]) {
      results.push({ status:'err', label:groupLabel(g), msg:'선택되지 않았습니다.', target:null });
    } else {
      const sel = s.fields.find(f => f.id === state.data[g]);
      results.push({ status:'ok', label:groupLabel(g), msg:`[${sel ? sel.label : ''}] 선택됨` });
    }
  });

  // 필드 검증
  s.fields.forEach(f => {
    if (f.type === 'check') return;
    const v = state.data[f.id] || '';
    if (f.required && !v) {
      results.push({ status:'err', label:f.label, msg:'입력되지 않았습니다.', target:f.id });
    } else if (f.validate) {
      const err = f.validate(v);
      if (err) {
        results.push({ status:'err', label:f.label, msg:err, target:f.id });
      } else if (v) {
        results.push({ status:'ok', label:f.label, msg:'정상 입력됨' });
      }
    } else if (v) {
      results.push({ status:'ok', label:f.label, msg:'입력됨' });
    }
  });

  // 일반 주의사항
  const warnings = [];
  if (state.data.kind === 'kind_re') {
    warnings.push('재발급의 경우 기존 여권을 함께 제출해야 합니다.');
  }
  if (state.data.mil === 'mil_not') {
    warnings.push('병역 미필자는 국외여행허가서를 별도로 제출하셔야 합니다.');
  }
  if (!state.data.nameHanja) {
    warnings.push('한자 성명을 입력하지 않으셨습니다. 한자가 없으시면 그대로 진행해도 됩니다.');
  }
  warnings.forEach(w => results.push({ status:'warn', label:'안내', msg:w }));

  const hasError = results.some(r => r.status === 'err');
  const okCount = results.filter(r => r.status === 'ok').length;
  const errCount = results.filter(r => r.status === 'err').length;

  const itemsHTML = results.map((r, i) => {
    const icon = r.status === 'ok' ? '✓' : (r.status === 'warn' ? '!' : '✗');
    const jumpBtn = r.target ? `<button class="jump" onclick="jumpTo('${r.target}')">이동</button>` : '';
    return `
      <div class="check-item ${r.status}">
        <div class="icon">${icon}</div>
        <div class="text">
          <span class="field-name">${r.label}</span> — ${r.msg}
        </div>
        ${jumpBtn}
      </div>
    `;
  }).join('');

  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'reviewModal';
  modal.innerHTML = `
    <div class="modal">
      <h2>${hasError ? '작성 내용을 확인해주세요' : '작성 내용 검토 완료'}</h2>
      <div class="modal-sub">
        정상 ${okCount}건, 오류 ${errCount}건, 안내 ${warnings.length}건
      </div>
      ${itemsHTML}
      <div class="modal-actions">
        <button class="btn" onclick="closeModal()">계속 작성</button>
        <button class="btn primary large" onclick="goFinish()" ${hasError ? 'disabled' : ''}>
          ${hasError ? '오류 수정 후 진행 가능' : '발급 단계로 진행 →'}
        </button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
}

function groupLabel(g) {
  return ({ kind:'여권 종류', period:'유효기간', gender:'성별', mil:'병역사항' })[g] || g;
}

function jumpTo(id) {
  closeModal();
  const el = document.getElementById('f_' + id);
  if (el) {
    el.focus();
    el.scrollIntoView({ behavior:'smooth', block:'center' });
  }
}

function closeModal() {
  const m = document.getElementById('reviewModal') || document.getElementById('finishModal');
  if (m) m.remove();
}

// ============================================================
// 7. 발급 단계
// ============================================================
function goFinish() {
  closeModal();
  const modal = document.createElement('div');
  modal.className = 'modal-overlay';
  modal.id = 'finishModal';
  modal.innerHTML = `
    <div class="modal">
      <h2>작성이 완료되었습니다</h2>
      <div class="modal-sub">아래 방법 중 하나를 선택해주세요.</div>

      <div class="finish-grid">
        <button class="finish-card" onclick="doPrint('A4')">
          <h3>일반용지 프린터로 인쇄</h3>
          <p>A4 일반 용지에 출력합니다. 작성 확인용이나 임시 보관용으로 적합합니다.</p>
        </button>
        <button class="finish-card" onclick="doPrint('OFFICIAL')">
          <h3>신청서 전용 프린터로 인쇄</h3>
          <p>여권 신청서 전용 용지에 출력합니다. 접수 제출용입니다.</p>
        </button>
        <button class="finish-card" onclick="doSavePDF()">
          <h3>PDF로 저장</h3>
          <p>본인 USB·이메일 등으로 가져가실 때 사용하세요. 저장 후 댁에서 인쇄도 가능합니다.</p>
        </button>
        <button class="finish-card" onclick="closeModal()">
          <h3>다시 검토하기</h3>
          <p>작성 내용을 한 번 더 확인하고 싶으시면 선택하세요.</p>
        </button>
      </div>

      <div class="note warn" style="margin-top:18px;">
        <strong>인쇄 후 안내</strong><br>
        ① 출력물 옆에 본인 서명 또는 도장을 찍어주세요.<br>
        ② 사진(3.5×4.5cm, 6개월 이내)을 부착하셔야 합니다.<br>
        ③ 본인 신분증과 함께 접수 창구에 제출해주세요.
      </div>

      <div class="modal-actions">
        <button class="btn danger" onclick="confirmReset()">완료 후 화면 초기화</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
}

function doPrint(type) {
  // type별로 사용자에게 안내 (실제 프린터 선택은 인쇄 다이얼로그에서)
  const msg = type === 'A4'
    ? '인쇄 창에서 [일반용지 프린터]를 선택해주세요.'
    : '인쇄 창에서 [신청서 전용 프린터]를 선택해주세요.';
  alert(msg);
  closeModal();
  setTimeout(() => window.print(), 200);
}

function doSavePDF() {
  alert('인쇄 창이 열리면 프린터 선택에서 [PDF로 저장]을 선택해주세요.');
  closeModal();
  setTimeout(() => window.print(), 200);
}

// ============================================================
// 8. 공통 유틸
// ============================================================
function goHome() {
  if (confirm('작성 중인 내용이 모두 사라집니다. 처음 화면으로 가시겠습니까?')) {
    resetAll();
  }
}
function confirmReset() {
  if (confirm('정말로 초기화하시겠습니까? 작성하신 내용은 모두 삭제됩니다.')) {
    resetAll();
  }
}
function resetAll() {
  state.view = 'intro';
  state.schemaId = null;
  state.data = {};
  state.errors = {};
  state.activeField = null;
  state.romanTouched = {};
  closeModal();
  render();
}

function changeFontSize(delta) {
  const root = document.documentElement;
  const cur = parseInt(getComputedStyle(root).getPropertyValue('--base')) || 18;
  const next = Math.max(14, Math.min(26, cur + delta));
  root.style.setProperty('--base', next + 'px');
}

function changeZoom(delta) {
  state.zoom = Math.max(0.6, Math.min(1.4, state.zoom + delta));
  const canvas = document.getElementById('canvas');
  if (canvas) canvas.style.transform = `scale(${state.zoom})`;
  const z = document.getElementById('zoomVal');
  if (z) z.textContent = Math.round(state.zoom*100) + '%';
}

// 무동작 자동 초기화 (보안)
function resetIdleTimer() {
  if (state.idleTimer) clearTimeout(state.idleTimer);
  state.idleTimer = setTimeout(() => {
    if (state.view === 'form' || state.view === 'finish') {
      alert('3분간 입력이 없어 보안을 위해 화면을 초기화합니다.');
      resetAll();
    }
  }, 3 * 60 * 1000);
}

// 인쇄 후 알림
window.addEventListener('afterprint', () => {
  setTimeout(() => {
    if (confirm('인쇄가 완료되었습니까?\n\n[확인]을 누르시면 화면이 초기화됩니다.\n[취소]를 누르시면 화면에 그대로 머뭅니다.')) {
      resetAll();
    }
  }, 500);
});

// 시작
render();
resetIdleTimer();
</script>
</body>
</html>
